              {(()=>{
                // compute league avg for this week to show +/-
                const allPts=(d.weeklyMx||[])[effectiveMxWk-1]?.filter(m=>m.points>0).map(m=>m.points)||[];
                const lgAvg=allPts.length?allPts.reduce((a,b)=>a+b,0)/allPts.length:0;
                const top3=(m)=>{
                  const pp=m.players_points||{};
                  const starters=new Set(m.starters||[]);
                  // use players_points filtered to starters, fallback to starters_points array
                  let scored=[];
                  if(Object.keys(pp).length>0){
                    scored=Object.entries(pp).filter(([pid,pts])=>starters.has(pid)&&pts>0).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([pid,pts])=>{const f=rFull(pid);return{...f,pts};});
                  }else if(m.starters&&m.starters_points){
                    scored=m.starters.map((pid,i)=>({pid,pts:m.starters_points[i]||0})).filter(x=>x.pts>0).sort((a,b)=>b.pts-a.pts).slice(0,3).map(x=>{const f=rFull(x.pid);return{...f,pts:x.pts};});
                  }
                  return scored;
                };
                if(mxPairs.length===0)return<div className="card cp" style={{color:'var(--t3)'}}>No matchup data.</div>;
                return mxPairs.map(([a,b],i)=>{
                  const aW=(a.points||0)>(b.points||0),bW=(b.points||0)>(a.points||0);
                  const aVsAvg=lgAvg>0?((a.points||0)-lgAvg):null;
                  const bVsAvg=lgAvg>0?((b.points||0)-lgAvg):null;
                  const aTop=top3(a),bTop=top3(b);
                  // H2H record
                  const aOwner=(rMap[a.roster_id]||{}).owner_id;
                  const bOwner=(rMap[b.roster_id]||{}).owner_id;
                  const h2hKey=aOwner&&bOwner?[aOwner,bOwner].sort().join('::'):null;
                  const h2h=h2hKey?h2hRecords[h2hKey]:null;
                  const aW2h=h2h?.[aOwner]||0,bW2h=h2h?.[bOwner]||0;
                  const h2hTotal=aW2h+bW2h;
                  return(
                    <div key={i} className="card" style={{marginBottom:10,overflow:'hidden'}}>
                      {/* Score bar */}
                      <div style={{display:'flex',alignItems:'stretch',borderBottom:'.5px solid var(--bd)'}}>
                        {/* Team A */}
                        <div style={{flex:1,padding:'14px 16px'}}>
                          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                            <Av avatar={a.av} name={a.tname} size={26}/>
                            <span style={{fontSize:15,fontWeight:800,letterSpacing:'-.01em',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.tname}</span>
                            {aW&&<span style={{fontSize:10,fontWeight:700,background:'#f0fdf4',color:'#16a34a',padding:'1px 7px',borderRadius:20}}>WIN</span>}
                          </div>
                          <div style={{display:'flex',alignItems:'baseline',gap:8}}>
                            <span style={{fontSize:32,fontWeight:800,color:aW?'var(--tx)':'#bbb',lineHeight:1}}>{(a.points||0).toFixed(2)}</span>
                            {aVsAvg!==null&&a.points>0&&<span style={{fontSize:12,fontWeight:600,color:aVsAvg>=0?'var(--green)':'var(--red)'}}>{aVsAvg>=0?'+':''}{aVsAvg.toFixed(1)} vs avg</span>}
                          </div>
                        </div>
                        {/* VS divider */}
                        <div style={{display:'flex',alignItems:'center',padding:'0 12px',color:'#ddd',fontSize:11,fontWeight:800,flexShrink:0}}>VS</div>
                        {/* Team B */}
                        <div style={{flex:1,padding:'14px 16px',textAlign:'right'}}>
                          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,justifyContent:'flex-end'}}>
                            {bW&&<span style={{fontSize:10,fontWeight:700,background:'#f0fdf4',color:'#16a34a',padding:'1px 7px',borderRadius:20}}>WIN</span>}
                            <span style={{fontSize:15,fontWeight:800,letterSpacing:'-.01em',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'right'}}>{b.tname}</span>
                            <Av avatar={b.av} name={b.tname} size={26}/>
                          </div>
                          <div style={{display:'flex',alignItems:'baseline',gap:8,justifyContent:'flex-end'}}>
                            {bVsAvg!==null&&b.points>0&&<span style={{fontSize:12,fontWeight:600,color:bVsAvg>=0?'var(--green)':'var(--red)'}}>{bVsAvg>=0?'+':''}{bVsAvg.toFixed(1)} vs avg</span>}
                            <span style={{fontSize:32,fontWeight:800,color:bW?'var(--tx)':'#bbb',lineHeight:1}}>{(b.points||0).toFixed(2)}</span>
                          </div>
                        </div>
                      </div>
                      {/* Top scorers row */}
                      {(aTop.length>0||bTop.length>0)&&(
                        <div style={{display:'flex',background:'#fafaf9'}}>
                          {/* A top scorers */}
                          <div style={{flex:1,padding:'10px 16px',borderRight:'.5px solid var(--bd)'}}>
                            {aTop.length>0&&<div style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'.05em',color:'var(--t3)',marginBottom:6}}>Top scorers</div>}
                            {aTop.map((p,pi)=>(
                              <div key={pi} style={{display:'flex',alignItems:'center',gap:6,marginBottom:pi<aTop.length-1?4:0}}>
                                <span style={{fontSize:11,fontWeight:800,color:pi===0?'#d97706':pi===1?'#6b7280':'#aaa',width:14,flexShrink:0}}>{pi===0?'①':pi===1?'②':'③'}</span>
                                <div style={{flex:1,minWidth:0}}>
                                  <div style={{fontSize:12,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{players?p.name:<span style={{color:'var(--t3)'}}>…</span>}</div>
                                  {p.pos&&<div style={{fontSize:10,color:'var(--t3)'}}>{p.pos}{p.team?` · ${p.team}`:''}</div>}
                                </div>
                                <span style={{fontSize:13,fontWeight:800,flexShrink:0,color:pi===0?'var(--amber)':'var(--t2)'}}>{typeof p.pts==='number'?p.pts.toFixed(1):p.pts}</span>
                              </div>
                            ))}
                            {aTop.length===0&&a.points>0&&<div style={{fontSize:11,color:'var(--t3)'}}>Player data loading…</div>}
                          </div>
                          {/* B top scorers */}
                          <div style={{flex:1,padding:'10px 16px'}}>
                            {bTop.length>0&&<div style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'.05em',color:'var(--t3)',marginBottom:6}}>Top scorers</div>}
                            {bTop.map((p,pi)=>(
                              <div key={pi} style={{display:'flex',alignItems:'center',gap:6,marginBottom:pi<bTop.length-1?4:0}}>
                                <span style={{fontSize:11,fontWeight:800,color:pi===0?'#d97706':pi===1?'#6b7280':'#aaa',width:14,flexShrink:0}}>{pi===0?'①':pi===1?'②':'③'}</span>
                                <div style={{flex:1,minWidth:0}}>
                                  <div style={{fontSize:12,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{players?p.name:<span style={{color:'var(--t3)'}}>…</span>}</div>
                                  {p.pos&&<div style={{fontSize:10,color:'var(--t3)'}}>{p.pos}{p.team?` · ${p.team}`:''}</div>}
                                </div>
                                <span style={{fontSize:13,fontWeight:800,flexShrink:0,color:pi===0?'var(--amber)':'var(--t2)'}}>{typeof p.pts==='number'?p.pts.toFixed(1):p.pts}</span>
                              </div>
                            ))}
                            {bTop.length===0&&b.points>0&&<div style={{fontSize:11,color:'var(--t3)'}}>Player data loading…</div>}
                          </div>
                        </div>
                      )}
                      {/* All-time series */}
                      {h2hTotal>0&&(
                        <div style={{padding:'8px 16px',background:'#f5f4f2',borderTop:'.5px solid var(--bd)',display:'flex',alignItems:'center',justifyContent:'center',gap:10}}>
                          <span style={{fontSize:13,fontWeight:800,color:aW2h>=bW2h?'var(--tx)':'var(--t3)'}}>{a.tname} {aW2h}</span>
                          <span style={{fontSize:10,fontWeight:700,color:'var(--t3)',letterSpacing:'.06em',textTransform:'uppercase'}}>All-time series</span>
                          <span style={{fontSize:13,fontWeight:800,color:bW2h>=aW2h?'var(--tx)':'var(--t3)'}}>{bW2h} {b.tname}</span>
                        </div>
                      )}
                    </div>
                  );
                });
              })()}
            </div>
          </div>
        )}

        {/* TRANSACTIONS */}
        {view==='transactions'&&(
          <div className="pg wide">
            <div>
              {wkBar(effectiveTxWk,setTxWk)}
              {curTx.length===0?<div className="card cp" style={{color:'var(--t3)'}}>No transactions week {effectiveTxWk}.</div>
              :curTx.map((t,i)=>{
                const isTrade=t.type==='trade';
                const ts=fmtTs(t.status_updated||t.created);
                const faab=t.settings?.waiver_bid;
                const adds=Object.keys(t.adds||{});
                const drops=Object.keys(t.drops||{});

                if(isTrade){
                  const groups=buildTradeReceives(t);
                  const groupA=groups[0],groupB=groups[1];
                  if(!groupA||!groupB) return null;

                  const renderPlayer=(pid)=>{
                    const{name,pos,team}=rFull(pid);
                    return(
                      <div key={pid} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 0',borderBottom:'.5px solid rgba(0,0,0,.05)'}}>
                        <PlayerPhoto playerId={pid} name={name} pos={pos} size={36} bg='#1e293b' accent='#64748b'
                          style={{borderRadius:8,flexShrink:0}}/>
                        <div style={{minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{players?name:<span style={{color:'var(--t3)'}}>…</span>}</div>
                          {pos&&<div style={{fontSize:10,color:'var(--t3)'}}>{pos}{team?` · ${team}`:''}</div>}
                        </div>
                      </div>
                    );
                  };

                  const renderPick=(pk,pi)=>{
                    const dp2=resolvePick(pk);
                    const fut=parseInt(pk.season)>parseInt(d.league?.season||'0');
                    return(
                      <div key={pi} style={{display:'flex',alignItems:'flex-start',gap:8,padding:'7px 0',borderBottom:'.5px solid rgba(0,0,0,.05)'}}>
                        <div style={{width:36,height:36,borderRadius:8,background:'var(--bbg)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                          <span style={{fontSize:9,fontWeight:800,color:'var(--blue)',lineHeight:1,letterSpacing:'.02em'}}>RD</span>
                          <span style={{fontSize:16,fontWeight:800,color:'var(--blue)',lineHeight:1}}>{pk.round}</span>
                        </div>
                        <div style={{minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:'var(--blue)'}}>{pk.season} · Round {pk.round}</div>
                          {pk.orig&&<div style={{fontSize:11,color:'var(--t3)'}}>orig. {pk.orig}</div>}
                          {dp2
                            ?<div style={{fontSize:11,color:'var(--green)',fontWeight:700,marginTop:1}}>→ {dp2.name}{dp2.pos?` (${dp2.pos})`:''}</div>
                            :!fut&&<div style={{fontSize:10,color:'var(--t3)',marginTop:1,fontStyle:'italic'}}>not yet used</div>
                          }
                        </div>
                      </div>
                    );
                  };

                  const TradeCol=({group})=>(
                    <div style={{padding:'14px 16px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,paddingBottom:10,borderBottom:'.5px solid var(--bd)'}}>
                        <Av avatar={group.av} name={group.name} size={30}/>
                        <div style={{minWidth:0}}>
                          <div style={{fontSize:16,fontWeight:800,letterSpacing:'-.02em',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{group.name}</div>
                          <div style={{fontSize:10,color:'var(--t3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.04em'}}>receives</div>
                        </div>
                      </div>
                      {group.gets.pl.map(pid=>renderPlayer(pid))}
                      {group.gets.pk.map((pk,pi)=>renderPick(pk,pi))}
                      {group.gets.pl.length===0&&group.gets.pk.length===0&&(
                        <div style={{fontSize:11,color:'var(--t3)',fontStyle:'italic',padding:'6px 0'}}>Nothing listed</div>
                      )}
                    </div>
                  );

                  return(
                    <div key={i} className="card" style={{marginBottom:10,overflow:'hidden'}}>
                      <div style={{padding:'10px 16px 9px',borderBottom:'.5px solid var(--bd)',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',background:'#fafaf9'}}>
                        <span style={{fontSize:10,fontWeight:800,padding:'2px 9px',borderRadius:20,background:'#f0ebff',color:'#7c3aed',letterSpacing:'.04em'}}>TRADE</span>
                        {ts&&<span style={{fontSize:11,color:'var(--t3)'}}>{ts}</span>}
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr'}}>
                        <TradeCol group={groupA}/>
                        <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'0 10px',color:'#ccc',fontSize:22}}>⇄</div>
                        <div style={{borderLeft:'.5px solid var(--bd)'}}><TradeCol group={groupB}/></div>
                      </div>
                    </div>
                  );
                }

                // Waiver / Free Agent
                return(
                  <div key={i} className="card" style={{marginBottom:10,overflow:'hidden',borderLeft:`4px solid ${t.type==='waiver'?'#f59e0b':'#22c55e'}`}}>
                    <div style={{padding:'10px 16px 8px',borderBottom:'.5px solid var(--bd)',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',background:'#fafaf9'}}>
                      <span style={{fontSize:10,fontWeight:800,padding:'2px 9px',borderRadius:20,background:t.type==='waiver'?'#fffbeb':'#f0fdf4',color:t.type==='waiver'?'#d97706':'#16a34a',letterSpacing:'.04em'}}>{t.type==='waiver'?'WAIVER':'FREE AGENT'}</span>
                      {faab!=null&&<span style={{fontSize:10,fontWeight:700,background:'#fffbeb',color:'#d97706',padding:'2px 7px',borderRadius:20}}>${faab} FAAB</span>}
                      {ts&&<span style={{fontSize:11,color:'var(--t3)'}}>{ts}</span>}
                    </div>
                    <div style={{padding:'12px 16px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                        <Av avatar={gU(t.roster_ids?.[0]).avatar} name={gN(t.roster_ids?.[0])} size={24}/>
                        <span style={{fontSize:15,fontWeight:800,letterSpacing:'-.01em'}}>{gN(t.roster_ids?.[0])}</span>
                      </div>
                      {adds.map(pid=>{const{name,pos,team}=rFull(pid);const espnId=players?.[pid]?.espn_id||null;return(
                        <div key={pid} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,padding:'6px 0',borderBottom:'.5px solid rgba(0,0,0,.05)'}}>
                          <PlayerPhoto playerId={pid} espnId={espnId} name={name} pos={pos} size={38}
                            style={{borderRadius:8,flexShrink:0}} bg='#14532d' accent='#22c55e'/>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:'flex',alignItems:'center',gap:5}}>
                              <span style={{fontSize:12,color:'var(--green)',fontWeight:800}}>+</span>
                              <div style={{fontSize:13,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{players?name:'…'}</div>
                            </div>
                            {pos&&<div style={{fontSize:10,color:'var(--t3)'}}>{pos}{team?` · ${team}`:''}</div>}
                          </div>
                        </div>
                      );})}
                      {drops.map(pid=>{const{name,pos,team}=rFull(pid);const espnId=players?.[pid]?.espn_id||null;return(
                        <div key={pid} style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,padding:'6px 0'}}>
                          <PlayerPhoto playerId={pid} espnId={espnId} name={name} pos={pos} size={38}
                            style={{borderRadius:8,flexShrink:0,opacity:.55}} bg='#7f1d1d' accent='#ef4444'/>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:'flex',alignItems:'center',gap:5}}>
                              <span style={{fontSize:12,color:'var(--red)',fontWeight:800}}>−</span>
                              <div style={{fontSize:12,color:'var(--t2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{players?name:'…'}{pos?<span style={{color:'var(--t3)'}}> ({pos})</span>:''}</div>
                            </div>
                          </div>
                        </div>
                      );})}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* DRAFT — team-centric cards, grouped by actual drafter */}
        {view==='draft'&&(
          <div className="pg wide">
            <div>
              {!draftTeams?<div className="card cp" style={{color:'var(--t3)',display:'flex',gap:8,alignItems:'center'}}><Spin s={16}/>Loading draft…</div>
              :<div>
                <div className="card cp" style={{marginBottom:10}}>
                  <div style={{fontSize:15,fontWeight:700,marginBottom:2}}>{d.draftData?.season} Draft</div>
                  <div style={{fontSize:12,color:'var(--t3)'}}>{d.draftData?.type} · {d.draftData?.settings?.rounds} rounds · {d.draftData?.settings?.teams} teams{d.draftData?.status==='complete'?' · Complete':''}</div>
                  <div style={{fontSize:11,color:'var(--t3)',marginTop:4}}>Organized by actual drafter. Blue highlight = player has since been traded.</div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:'10px'}}>
                  {draftTeams.map(team=>(
                    <div key={team.rid} className="draft-team-card">
                      <div className="draft-team-hdr">
                        <Av avatar={team.avatar} name={team.teamName} size={30}/>
                        <div style={{minWidth:0}}>
                          <div style={{fontSize:15,fontWeight:800,letterSpacing:'-.01em',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{team.teamName}</div>
                          <div style={{fontSize:10,color:'var(--t3)'}}>{team.picks.length} picks</div>
                        </div>
                      </div>
                      {team.picks.length===0?<div style={{fontSize:11,color:'var(--t3)'}}>No picks recorded.</div>
                      :team.picks.map((pick,pi)=>{
                        const m=pick.metadata||{};
                        const name=`${m.first_name||''} ${m.last_name||''}`.trim()||pick.player_id;
                        const crid=team.pcr[String(pick.player_id)];
                        const traded=crid&&String(crid)!==String(team.rid);
                        return(
                          <div key={pi} className="draft-pick-row" style={{background:traded?'#eff6ff':'inherit',marginLeft:'-1px',marginRight:'-1px',paddingLeft:'4px',paddingRight:'4px',borderRadius:4}}>
                            <span className="draft-rnd">Rd {pick.round}</span>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:12,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</div>
                              <div style={{display:'flex',gap:4,alignItems:'center',flexWrap:'wrap'}}>
                                {m.position&&<span style={{fontSize:10,color:'var(--t3)'}}>{m.position}{m.team?` · ${m.team}`:''}</span>}
                                {traded&&<span style={{fontSize:10,color:'var(--blue)',fontWeight:600}}>→ {gN(crid)}</span>}
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              </div>}
            </div>
          </div>
        )}

        {/* HISTORY */}
        {view==='history'&&(
          <div className="pg wide">
            <div>
              {loadingSzns.size>0&&(
                <div style={{display:'flex',alignItems:'center',gap:8,color:'var(--t3)',fontSize:13,marginBottom:'1rem'}}>
                  <Spin s={16}/>Loading season history…
                </div>
              )}

              {/* All-time standings with playoff records */}
              <div className="card cp" style={{marginBottom:10,overflowX:'auto'}}>
                <div style={{fontSize:16,fontWeight:800,marginBottom:'.75rem'}}>🏅 All-Time Standings</div>
                {leagueHistory.standings.length===0
                  ?<div style={{color:'var(--t3)',fontSize:13}}>Click the History tab to load season data.</div>
                  :<table className="hist-table">
                    <thead>
                      <tr>
                        <th>#</th><th>Team</th>
                        <th>W</th><th>L</th><th>Win%</th>
                        <th>Total PF</th>
                        <th>PO Apps</th><th>PO W-L</th>
                        <th>Seasons</th><th>🏆</th>
                      </tr>
                    </thead>
                    <tbody>
                      {leagueHistory.standings.map((t,i)=>{
                        const tot=t.wins+t.losses;
                        const color=rankColor(i+1,leagueHistory.standings.length);
                        const poRec=t.playoffWins+t.playoffLosses>0?`${t.playoffWins}-${t.playoffLosses}`:'—';
                        const poColor=t.playoffWins>t.playoffLosses?'var(--green)':t.playoffLosses>t.playoffWins?'var(--red)':'var(--t2)';
                        return(
                          <tr key={t.oid||i}>
                            <td><div style={{width:24,height:24,borderRadius:6,background:color,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:11,fontWeight:800,color:'#fff'}}>{i+1}</span></div></td>
                            <td style={{fontWeight:700,whiteSpace:'nowrap'}}>{t.name}</td>
                            <td style={{fontWeight:700,color:'var(--green)'}}>{t.wins}</td>
                            <td style={{color:'var(--t2)'}}>{t.losses}</td>
                            <td style={{fontWeight:600}}>{tot>0?((t.wins/tot)*100).toFixed(0)+'%':'—'}</td>
                            <td style={{fontWeight:600}}>{t.pf.toFixed(1)}</td>
                            <td style={{color:'var(--t3)',textAlign:'center'}}>{t.playoffApps||'—'}</td>
                            <td style={{fontWeight:600,color:poColor,textAlign:'center'}}>{poRec}</td>
                            <td style={{color:'var(--t3)',textAlign:'center'}}>{t.seasons}</td>
                            <td style={{textAlign:'center'}}>{t.championships>0?<span style={{fontSize:15}}>{'🏆'.repeat(Math.min(t.championships,5))}</span>:'—'}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                }
              </div>

              {/* Champions showcase */}
              {leagueHistory.seasons.filter(s=>s.complete).length>0&&(
                <div className="card cp">
                  <div style={{fontSize:16,fontWeight:800,marginBottom:'1rem'}}>🏆 Hall of Champions</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
                    {leagueHistory.seasons.filter(s=>s.complete).map((s,i)=>{
                      // Find champion's owner in standings for avatar
                      const champEntry=leagueHistory.standings.find(t=>t.oid===s.champOwnerId);
                      const champs=leagueHistory.standings.filter(t=>t.oid===s.champOwnerId);
                      const champColor=champs.length?rankColor(leagueHistory.standings.indexOf(champs[0])+1,leagueHistory.standings.length):'#d97706';
                      return(
                        <div key={s.id} style={{
                          flex:'1 1 160px',minWidth:140,maxWidth:200,
                          background:`linear-gradient(145deg,${champColor}15 0%,var(--sf) 100%)`,
                          border:`1px solid ${champColor}30`,
                          borderRadius:'var(--rl)',padding:'1rem',
                          textAlign:'center',position:'relative',overflow:'hidden'
                        }}>
                          <div style={{position:'absolute',top:-8,right:-8,fontSize:52,opacity:.07,lineHeight:1}}>🏆</div>
                          <div style={{fontSize:28,marginBottom:4}}>🏆</div>
                          <div style={{fontSize:22,fontWeight:900,letterSpacing:'-.03em',color:champColor,lineHeight:1,marginBottom:4}}>{s.season}</div>
                          <div style={{fontSize:13,fontWeight:800,color:'var(--tx)',lineHeight:1.3}}>{s.champion}</div>
                          <button className="btn" style={{fontSize:10,padding:'2px 8px',height:'auto',marginTop:8}}
                            onClick={()=>{setActiveSzn(s.id);setView('feed');}}>
                            View Season
                          </button>
                        </div>
                      );
                    })}
                  </div>
                  {leagueHistory.seasons.some(s=>!s.complete)&&(
                    <div style={{marginTop:12,padding:'8px 12px',background:'var(--bg)',borderRadius:8,display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:14}}>👑</span>
                      <span style={{fontSize:12,color:'var(--t3)'}}>
                        {leagueHistory.seasons.find(s=>!s.complete)?.season} season in progress — champion to be crowned
                      </span>
                    </div>
                  )}
                </div>
              )}
              {leagueHistory.standings.length>0&&leagueHistory.seasons.filter(s=>s.complete).length===0&&(
                <div className="card cp" style={{textAlign:'center',color:'var(--t3)'}}>
                  <div style={{fontSize:24,marginBottom:8}}>🏆</div>
                  No completed seasons yet — the first champion is still to be crowned.
                </div>
              )}
            </div>
          </div>
        )}

        {/* NEWSLETTER */}
        {view==='newsletter'&&(
          <div className="pg wide">
            <div>
              <div className="card cp" style={{marginBottom:8}}>
                <div style={{fontSize:13,fontWeight:700,marginBottom:3}}>Anthropic API Key</div>
                <div style={{fontSize:11,color:'var(--t3)',marginBottom:10,lineHeight:1.6}}>Required. Get one free at <a href="https://console.anthropic.com" target="_blank" style={{color:'var(--blue)'}}>console.anthropic.com</a> → API Keys. ~$0.01 per newsletter, saved in your browser.</div>
                <div style={{display:'flex',gap:6}}>
                  <input className="inpp" type={showK?'text':'password'} placeholder="sk-ant-..." value={apiKey} onChange={e=>saveK(e.target.value)}/>
                  <button className="btn" onClick={()=>setShowK(s=>!s)}>{showK?'Hide':'Show'}</button>
                  <button className="btn dk" onClick={genNl} disabled={nlLoading||!apiKey.trim()}>{nlLoading?'Writing…':'Generate'}</button>
                </div>
              </div>
              {nlLoading&&<div style={{display:'flex',gap:8,alignItems:'center',color:'var(--t3)',fontSize:13,padding:'.75rem 0'}}><Spin s={16}/>Writing with full context…</div>}
              {nletter==='__NK__'&&<div style={{color:'var(--amber)',fontSize:12}}>Enter your API key above.</div>}
              {nletter&&nletter!=='__NK__'&&!nlLoading&&(
                <div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                    <span style={{fontSize:11,color:'var(--t3)'}}>Week {curWk} newsletter</span>
                    <button className="btn" style={{fontSize:11,padding:'2px 9px',height:'auto'}} onClick={()=>{try{navigator.clipboard.writeText(nletter)}catch{}}}>Copy</button>
                  </div>
                  <div className="card cp" style={{fontSize:13,lineHeight:1.85,whiteSpace:'pre-wrap'}}>{nletter}</div>
                </div>
              )}
              {!nletter&&!nlLoading&&<div className="card cp" style={{color:'var(--t3)',fontSize:13,textAlign:'center'}}>Generates from standings, all {curWk} weeks, active streaks, power rankings, and transactions.</div>}
            </div>
          </div>
        )}
        </>
      )}

      <nav className="mnav">
        <div className="mnav-r">
          {NAV.map(n=>(
            <button key={n.id} className={`mnb${view===n.id?' on':''}`} onClick={()=>{setView(n.id);if(n.id!=='teams')setTeamId(null);}}>
              <span className="ico">{n.icon}</span>
              <span>{n.label}</span>
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
