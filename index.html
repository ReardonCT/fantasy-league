<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>The League</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --hdr:#1a1918;--hdr-text:#f5f3ef;
  --bg:#f0eeea;--surface:#fff;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --text:#1a1918;--t2:#666662;--t3:#aaa;
  --green:#16a34a;--green-bg:#f0fdf4;
  --red:#dc2626;--red-bg:#fef2f2;
  --blue:#2563eb;--blue-bg:#eff6ff;
  --amber:#d97706;--amber-bg:#fffbeb;
  --orange:#ea580c;--orange-bg:#fff7ed;
  --purple:#7c3aed;--purple-bg:#f5f3ff;
  --r:8px;--rlg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* ── Header ── */
.hdr{background:var(--hdr);color:var(--hdr-text);position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.06)}
.hdr-inner{max-width:1120px;margin:0 auto;padding:0 1.25rem;height:54px;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.league-title{font-size:15px;font-weight:700;letter-spacing:-.01em}
.league-sub{font-size:11px;opacity:.5;margin-top:1px}
.nav-tabs{display:flex;gap:1px}
.ntab{background:none;border:none;color:var(--hdr-text);opacity:.55;font-size:12px;font-weight:600;padding:5px 11px;cursor:pointer;border-radius:6px;font-family:inherit;letter-spacing:.01em;height:auto;white-space:nowrap}
.ntab:hover{opacity:.85;background:rgba(255,255,255,.07)}
.ntab.on{opacity:1;background:rgba(255,255,255,.12)}
/* ── Mobile nav ── */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--hdr);border-top:1px solid rgba(255,255,255,.08);z-index:100;padding-bottom:env(safe-area-inset-bottom,0px)}
.mob-nav-row{display:flex;height:54px}
.mnb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--hdr-text);opacity:.45;font-size:9px;font-weight:700;letter-spacing:.03em;cursor:pointer;font-family:inherit;text-transform:uppercase}
.mnb .ico{font-size:17px;line-height:1}
.mnb.on{opacity:1}
/* ── Layout ── */
.page{max-width:1120px;margin:0 auto;padding:1.25rem;display:grid;grid-template-columns:1fr 270px;gap:1.25rem;align-items:start}
.page.wide{grid-template-columns:1fr}
.main-col{min-width:0}
/* ── Cards ── */
.card{background:var(--surface);border-radius:var(--rlg);border:.5px solid var(--border)}
.cp{padding:1.25rem}
/* ── Event cards ── */
.ec{background:var(--surface);border-radius:var(--rlg);border:.5px solid var(--border);border-left:4px solid transparent;padding:.9rem 1.1rem;margin-bottom:.65rem}
.ec.amber{border-left-color:#f59e0b}
.ec.green{border-left-color:#22c55e}
.ec.blue{border-left-color:#3b82f6}
.ec.red{border-left-color:#ef4444}
.ec.orange{border-left-color:#f97316}
.ec.purple{border-left-color:#8b5cf6}
.ec.gray{border-left-color:#d1d5db}
.ec-top{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.3rem}
.ec-badge{font-size:10px;font-weight:700;letter-spacing:.05em;padding:2px 7px;border-radius:4px}
.ec-wk{font-size:11px;color:var(--t3);white-space:nowrap}
.ec-title{font-size:14px;font-weight:700;line-height:1.35;margin-bottom:.2rem}
.ec-body{font-size:12px;color:var(--t2);line-height:1.55}
.ec-chips{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.5rem}
.chip{font-size:11px;padding:2px 7px;border-radius:20px;background:#f0eeea;color:var(--t2);font-weight:500}
/* ── Week divider ── */
.wk-div{display:flex;align-items:center;gap:.6rem;margin:1.1rem 0 .65rem;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3)}
.wk-div::after{content:'';flex:1;height:1px;background:var(--border)}
/* ── Streak pills ── */
.streak-bar{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem}
.spill{display:flex;align-items:center;gap:.35rem;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
/* ── Sidebar rankings ── */
.sidebar{position:sticky;top:66px}
.rank-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);margin-bottom:.65rem}
.rank-row{display:flex;align-items:center;gap:.5rem;padding:6px 0;border-bottom:.5px solid var(--border)}
.rank-row:last-child{border-bottom:none}
.rn{width:18px;font-size:13px;font-weight:700;color:var(--t3);text-align:center;flex-shrink:0}
.rname{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rarrow{font-size:13px;font-weight:700;width:14px;text-align:center;flex-shrink:0}
.ravg{font-size:11px;color:var(--t3);flex-shrink:0}
/* ── Loading ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:.75rem}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{border:3px solid #e0deda;border-top-color:var(--hdr);border-radius:50%;animation:spin .75s linear infinite;flex-shrink:0}
.prog{width:180px;height:3px;background:#e0deda;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--hdr);border-radius:2px;transition:width .3s}
/* ── Avatar ── */
.av{border-radius:50%;background:#e0deda;display:flex;align-items:center;justify-content:center;font-weight:700;color:#888;overflow:hidden;flex-shrink:0}
/* ── Rankings page cards ── */
.rpc{padding:1rem 1.1rem;border-left:4px solid transparent}
/* ── Standings ── */
.srow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--border)}
.srow:last-child{border-bottom:none}
/* ── Matchup cards ── */
.mcard{padding:12px 14px;display:flex;align-items:center;gap:8px;margin-bottom:8px}
/* ── Tx card ── */
.txcard{padding:.9rem 1.1rem;margin-bottom:8px;border-left:4px solid transparent}
.tx-inner{background:#f9f8f6;border-radius:8px;padding:10px 12px}
/* ── Draft table ── */
.draftw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:5px 8px;border-bottom:.5px solid var(--border);font-size:11px}
th{font-weight:700;color:var(--t3);font-size:10px;text-transform:uppercase;letter-spacing:.04em;background:var(--surface)}
/* ── Newsletter ── */
input.inp,input.inpp{background:#f5f3ef;border:.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:13px;padding:8px 11px;height:34px;outline:none;font-family:inherit}
input.inp{width:100%}
input.inpp{flex:1}
input.inp:focus,input.inpp:focus{border-color:rgba(0,0,0,.3)}
button.btn{background:none;border:.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:13px;font-family:inherit;padding:5px 12px;height:34px;cursor:pointer;white-space:nowrap}
button.btn:hover:not(:disabled){background:#f0eeea}
button.btn:disabled{opacity:.4;cursor:not-allowed}
button.btn.dark{background:var(--hdr);color:var(--hdr-text);border-color:var(--hdr)}
button.btn.dark:hover:not(:disabled){background:#333}
/* ── Responsive ── */
@media(max-width:760px){
  .page{grid-template-columns:1fr;padding:.75rem}
  .sidebar-wrap{display:none}
  .mob-nav{display:block}
  body{padding-bottom:54px}
  .hdr-inner{padding:0 .9rem}
  .nav-tabs{display:none}
}
@media(min-width:761px){.mob-nav{display:none}}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.65rem;margin-bottom:1rem}
.scard{background:var(--surface);border-radius:10px;padding:.85rem 1rem;border:.5px solid var(--border)}
.slabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t3);margin-bottom:.2rem}
.sval{font-size:20px;font-weight:800;line-height:1}
.ssub{font-size:11px;color:var(--t2);margin-top:.15rem}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useMemo}=React;
const BASE='https://api.sleeper.app/v1';
const LEAGUE_ID='1334357712166727680';
const get=url=>fetch(url).then(r=>r.json());
const fmtTs=ts=>ts?new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'';

// ── Avatar ────────────────────────────────────────────────
const Av=({avatar,name,size=28})=>{
  const [e,setE]=useState(false);
  const s=size+'px';const fs=Math.floor(size*.37)+'px';
  return<div className="av" style={{width:s,height:s,fontSize:fs}}>{avatar&&!e?<img src={`https://sleepercdn.com/avatars/thumbs/${avatar}`} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={()=>setE(true)}/>:(name||'?').slice(0,2).toUpperCase()}</div>;
};
const Spin=({s=18})=><div className="spin" style={{width:s,height:s}}/>;

// ── Event type config ─────────────────────────────────────
const ET={
  trade:    {c:'purple',badge:'Trade 💼',      bg:'#f5f3ff',tc:'#7c3aed'},
  waiver:   {c:'amber', badge:'Waiver 📋',     bg:'#fffbeb',tc:'#d97706'},
  free_agent:{c:'green',badge:'Free Agent ✍️', bg:'#f0fdf4',tc:'#16a34a'},
  king:     {c:'amber', badge:'King of the Week 👑',bg:'#fffbeb',tc:'#d97706'},
  goat:     {c:'red',   badge:'The GOAT 💀',   bg:'#fef2f2',tc:'#dc2626'},
  lucky:    {c:'green', badge:'Lucky Win 🍀',  bg:'#f0fdf4',tc:'#16a34a'},
  unlucky:  {c:'orange',badge:'Unlucky Loss 😤',bg:'#fff7ed',tc:'#ea580c'},
  blowout:  {c:'red',   badge:'Blowout 💥',    bg:'#fef2f2',tc:'#dc2626'},
  close:    {c:'blue',  badge:'Nail-biter ⚡', bg:'#eff6ff',tc:'#2563eb'},
  hot_streak:{c:'orange',badge:'Win Streak 🔥',bg:'#fff7ed',tc:'#ea580c'},
  cold_streak:{c:'blue',badge:'Losing Streak ❄️',bg:'#eff6ff',tc:'#2563eb'},
  scr_hot:  {c:'orange',badge:'Scoring Hot 📈',bg:'#fff7ed',tc:'#ea580c'},
  scr_cold: {c:'blue',  badge:'Scoring Cold 📉',bg:'#eff6ff',tc:'#2563eb'},
};

const ECard=({ev})=>{
  const s=ET[ev.type]||{c:'gray',badge:ev.type,bg:'#f0eeea',tc:'#888'};
  return(
    <div className={`ec ${s.c}`}>
      <div className="ec-top">
        <span className="ec-badge" style={{background:s.bg,color:s.tc}}>{s.badge}</span>
        <span className="ec-wk">{ev.wkLabel}</span>
      </div>
      <div className="ec-title">{ev.title}</div>
      {ev.body&&<div className="ec-body">{ev.body}</div>}
      {ev.chips&&ev.chips.length>0&&<div className="ec-chips">{ev.chips.map((c,i)=><span key={i} className="chip">{c}</span>)}</div>}
    </div>
  );
};

// ── Build feed events from weekly data ────────────────────
function buildFeed({weeklyMx,weeklyTx,userMap,rosterMap,players}){
  const ev=[];
  const gT=rid=>{const u=userMap[(rosterMap[rid]||{}).owner_id]||{};return{name:u.metadata?.team_name||u.display_name||'Unknown',av:u.avatar};};
  const pN=pid=>{if(!players)return pid;const p=players[pid];return p?`${p.first_name||''} ${p.last_name||''}`.trim():pid;};

  weeklyMx.forEach((wData,wi)=>{
    if(!Array.isArray(wData)||!wData.length)return;
    const wk=wi+1,wkLabel=`Week ${wk}`;
    const mm={};wData.forEach(m=>{if(!mm[m.matchup_id])mm[m.matchup_id]=[];mm[m.matchup_id].push(m);});
    const pairs=Object.values(mm).filter(p=>p.length===2&&(p[0].points>0||p[1].points>0));
    if(!pairs.length)return;

    const scored=wData.filter(m=>m.points>0).map(m=>m.points);
    const sorted=[...scored].sort((a,b)=>a-b);
    const median=sorted[Math.floor(sorted.length/2)]||0;
    const avg=scored.length?scored.reduce((a,b)=>a+b,0)/scored.length:0;

    // King
    const hi=Math.max(...scored);
    const hiM=wData.find(m=>m.points===hi);
    if(hiM){const t=gT(hiM.roster_id);ev.push({id:`king-${wk}`,wk,wkLabel,type:'king',ord:2,title:`${t.name} put up a monster week`,body:`${hi.toFixed(1)} points — the highest score of Week ${wk}. The rest of the league took notes.`,chips:[`${hi.toFixed(1)} pts`,`League avg: ${avg.toFixed(1)}`]});}

    // Goat
    const lo=Math.min(...scored);
    const loM=wData.find(m=>m.points===lo&&m.points>0);
    if(loM&&lo>0){const t=gT(loM.roster_id);ev.push({id:`goat-${wk}`,wk,wkLabel,type:'goat',ord:5,title:`${t.name} had one to forget`,body:`Just ${lo.toFixed(1)} points — the lowest score of the week by a margin.`,chips:[`${lo.toFixed(1)} pts`,`${(avg-lo).toFixed(1)} below avg`]});}

    pairs.forEach(([a,b])=>{
      const win=(a.points||0)>(b.points||0)?a:b;
      const lose=(a.points||0)<(b.points||0)?a:b;
      const wpts=win.points||0,lpts=lose.points||0;
      if(!wpts||!lpts)return;
      const margin=wpts-lpts;
      const wt=gT(win.roster_id),lt=gT(lose.roster_id);
      // Lucky win
      if(wpts<median&&median>0){
        ev.push({id:`lucky-${wk}-${win.roster_id}`,wk,wkLabel,type:'lucky',ord:3,
          title:`${wt.name} stole a win they had no business winning`,
          body:`Just ${wpts.toFixed(1)} points and still got the W. ${lt.name} somehow found a way to be even worse.`,
          chips:[`Won ${wpts.toFixed(1)}-${lpts.toFixed(1)}`]});
      }
      // Unlucky loss — scored above median but lost
      if(lpts>median&&median>0){
        ev.push({id:`unlucky-${wk}-${lose.roster_id}`,wk,wkLabel,type:'unlucky',ord:3,
          title:`${lt.name} got robbed`,
          body:`${lpts.toFixed(1)} points — a top-half score — and still walked away with an L. Ran into ${wt.name}'s ${wpts.toFixed(1)}.`,
          chips:[`Lost ${lpts.toFixed(1)}-${wpts.toFixed(1)}`]});
      }
      // Blowout
      if(margin>30){
        ev.push({id:`blowout-${wk}-${win.roster_id}`,wk,wkLabel,type:'blowout',ord:4,
          title:`${wt.name} made a statement`,
          body:`Beat ${lt.name} by ${margin.toFixed(1)} points. That wasn't a game, that was a warning.`,
          chips:[`${wpts.toFixed(1)}-${lpts.toFixed(1)}`,`+${margin.toFixed(1)} margin`]});
      }
      // Close game
      if(margin>0&&margin<6){
        ev.push({id:`close-${wk}-${win.roster_id}`,wk,wkLabel,type:'close',ord:4,
          title:`${wt.name} escaped by ${margin.toFixed(2)} points`,
          body:`The closest game of Week ${wk}. ${lt.name} will be thinking about this one for a while.`,
          chips:[`${wpts.toFixed(2)}-${lpts.toFixed(2)}`]});
      }
    });

    // Transactions for this week
    const txArr=weeklyTx[wi]||[];
    txArr.filter(t=>t.status==='complete').forEach(t=>{
      const teams=(t.roster_ids||[]).map(rid=>gT(rid).name);
      const ts=fmtTs(t.status_updated||t.created);
      if(t.type==='trade'){
        const adds=Object.keys(t.adds||{});
        const picks=t.draft_picks||[];
        const sample=adds.slice(0,2).map(p=>pN(p)).filter(Boolean);
        const pickStr=picks.length?`${picks.length} pick${picks.length>1?'s':''}`:null;
        const assets=[...sample,pickStr].filter(Boolean);
        ev.push({id:`trade-${t.transaction_id||Math.random()}`,wk,wkLabel:ts||wkLabel,type:'trade',ord:1,
          title:`${teams.slice(0,2).join(' and ')} pulled off a deal`,
          body:assets.length?`Moved: ${assets.join(', ')}${adds.length>2?` and ${adds.length-2} more`:''}`:null,
          chips:teams});
      }else if(t.type==='waiver'||t.type==='free_agent'){
        const adds=Object.keys(t.adds||{}).map(p=>pN(p)).filter(Boolean);
        const drops=Object.keys(t.drops||{}).map(p=>pN(p)).filter(Boolean);
        const bid=t.settings?.waiver_bid;
        if(!adds.length)return;
        ev.push({id:`tx-${t.transaction_id||Math.random()}`,wk,wkLabel:ts||wkLabel,type:t.type,ord:6,
          title:`${teams[0]||'A team'} made a move`,
          body:`Added ${adds.slice(0,2).join(', ')}${drops.length?`. Dropped ${drops.slice(0,1).join(', ')}.`:''}`,
          chips:[...adds.slice(0,2),bid!=null?`$${bid} FAAB`:null].filter(Boolean)});
      }
    });
  });

  return ev;
}

// ── Streak detection ──────────────────────────────────────
function detectStreaks({weeklyMx,rosterMap,userMap}){
  const gN=rid=>{const u=userMap[(rosterMap[rid]||{}).owner_id]||{};return u.metadata?.team_name||u.display_name||'?';};
  const td={};
  weeklyMx.forEach((wData,wi)=>{
    if(!Array.isArray(wData))return;
    const mm={};wData.forEach(m=>{if(!mm[m.matchup_id])mm[m.matchup_id]=[];mm[m.matchup_id].push(m);});
    Object.values(mm).filter(p=>p.length===2).forEach(([a,b])=>{
      if(!a.points&&!b.points)return;
      const aW=(a.points||0)>(b.points||0);
      [[a,aW],[b,!aW]].forEach(([m,won])=>{
        if(!td[m.roster_id])td[m.roster_id]=[];
        td[m.roster_id].push({wk:wi+1,pts:m.points||0,won});
      });
    });
  });
  const allPts=Object.values(td).flatMap(w=>w.map(x=>x.pts)).filter(p=>p>0);
  const avg=allPts.length?allPts.reduce((a,b)=>a+b,0)/allPts.length:100;
  const streaks=[];
  Object.entries(td).forEach(([rid,weeks])=>{
    if(!weeks.length)return;
    const rev=[...weeks].sort((a,b)=>a.wk-b.wk).reverse();
    const name=gN(rid);
    let ws=0;for(const w of rev){if(w.won)ws++;else break;}
    let ls=0;for(const w of rev){if(!w.won)ls++;else break;}
    let hs=0;for(const w of rev){if(w.pts>avg)hs++;else break;}
    let cs=0;for(const w of rev){if(w.pts>0&&w.pts<avg)cs++;else break;}
    const stAvg=n=>rev.slice(0,n).reduce((a,b)=>a+b.pts,0)/n;
    if(ws>=3)streaks.push({rid,name,type:'hot_streak',count:ws,label:`${name}`,sub:`${ws}-game win streak`,detail:`${stAvg(ws).toFixed(1)} pts avg`});
    else if(ls>=3)streaks.push({rid,name,type:'cold_streak',count:ls,label:`${name}`,sub:`${ls}-game skid`,detail:`${stAvg(ls).toFixed(1)} pts avg`});
    if(hs>=3&&ws<3)streaks.push({rid,name,type:'scr_hot',count:hs,label:`${name}`,sub:`${hs} weeks over avg`,detail:`${stAvg(hs).toFixed(1)} pts avg`});
    if(cs>=3&&ls<3)streaks.push({rid,name,type:'scr_cold',count:cs,label:`${name}`,sub:`${cs} weeks under avg`,detail:`${stAvg(cs).toFixed(1)} pts avg`});
  });
  return streaks.sort((a,b)=>b.count-a.count);
}

// ── Power Rankings ────────────────────────────────────────
function powerRankings({rosters,weeklyMx,userMap,rosterMap}){
  const gT=rid=>{const u=userMap[(rosterMap[rid]||{}).owner_id]||{};return{name:u.metadata?.team_name||u.display_name||'?',av:u.avatar,dn:u.display_name||''}};
  const td={};
  rosters.forEach(r=>{const t=gT(r.roster_id);td[r.roster_id]={...t,rid:r.roster_id,w:r.settings?.wins||0,l:r.settings?.losses||0,pts:[]};});
  weeklyMx.forEach(wData=>{if(!Array.isArray(wData))return;wData.forEach(m=>{if(m.points>0&&td[m.roster_id])td[m.roster_id].pts.push(m.points);});});
  const teams=Object.values(td);
  const score=(t,pts)=>{
    const g=t.w+t.l;if(!g)return 0;
    const wp=t.w/g;
    const ap=pts.length?pts.reduce((a,b)=>a+b,0)/pts.length:0;
    const rp=pts.slice(-3);const ra=rp.length?rp.reduce((a,b)=>a+b,0)/rp.length:ap;
    const maxA=Math.max(...teams.map(x=>x.pts.length?x.pts.reduce((a,b)=>a+b,0)/x.pts.length:0),1);
    const maxR=Math.max(...teams.map(x=>{const r=x.pts.slice(-3);return r.length?r.reduce((a,b)=>a+b,0)/r.length:0;}),1);
    return wp*40+(ap/maxA)*30+(ra/maxR)*30;
  };
  const ranked=[...teams].sort((a,b)=>score(b,b.pts)-score(a,a.pts));
  const prev=[...teams].map(t=>({...t,pts:t.pts.slice(0,-1)})).sort((a,b)=>score(b,b.pts.slice(0,-1))-score(a,a.pts.slice(0,-1)));
  return ranked.map((t,i)=>{
    const pi=prev.findIndex(p=>p.rid===t.rid);
    const mv=pi-i;
    return{...t,rank:i+1,arrow:mv>0?'↑':mv<0?'↓':'→',aColor:mv>0?'#22c55e':mv<0?'#ef4444':'#bbb',avg:t.pts.length?(t.pts.reduce((a,b)=>a+b,0)/t.pts.length).toFixed(1):'—',last3:(()=>{const r=t.pts.slice(-3);return r.length?(r.reduce((a,b)=>a+b,0)/r.length).toFixed(1):'—';})()};
  });
}

// ── Streak pill style ─────────────────────────────────────
const spStyle=type=>({
  hot_streak:{background:'#fff7ed',color:'#ea580c'},
  cold_streak:{background:'#eff6ff',color:'#2563eb'},
  scr_hot:{background:'#f0fdf4',color:'#16a34a'},
  scr_cold:{background:'#fef2f2',color:'#dc2626'},
}[type]||{background:'#f0eeea',color:'#666'});

// ── App ───────────────────────────────────────────────────
function App(){
  const [view,setView]=useState('feed');
  const [prog,setProg]=useState(0);
  const [loaded,setLoaded]=useState(false);
  const [err,setErr]=useState(null);
  const [league,setLeague]=useState(null);
  const [users,setUsers]=useState([]);
  const [rosters,setRosters]=useState([]);
  const [nflState,setNflState]=useState(null);
  const [curWk,setCurWk]=useState(1);
  const [weeklyMx,setWeeklyMx]=useState([]);
  const [weeklyTx,setWeeklyTx]=useState([]);
  const [allTx,setAllTx]=useState([]);
  const [mxWk,setMxWk]=useState(1);
  const [txWk,setTxWk]=useState(1);
  const [players,setPlayers]=useState(null);
  const [draftData,setDraftData]=useState(null);
  const [draftPicks,setDraftPicks]=useState([]);
  const [nletter,setNletter]=useState('');
  const [nlLoading,setNlLoading]=useState(false);
  const [apiKey,setApiKey]=useState(()=>{try{return localStorage.getItem('ff_k')||''}catch{return ''}});
  const [showK,setShowK]=useState(false);
  const saveK=k=>{setApiKey(k);try{localStorage.setItem('ff_k',k)}catch{}};

  useEffect(()=>{
    (async()=>{
      try{
        setProg(10);
        const [lg,us,rs,ns]=await Promise.all([get(`${BASE}/league/${LEAGUE_ID}`),get(`${BASE}/league/${LEAGUE_ID}/users`),get(`${BASE}/league/${LEAGUE_ID}/rosters`),get(`${BASE}/state/nfl`)]);
        if(!lg?.league_id)throw new Error('League not found.');
        const w=Math.max(1,ns.week||1);
        setLeague(lg);setUsers(us);setRosters(rs);setNflState(ns);setCurWk(w);setMxWk(w);setTxWk(w);
        setProg(25);
        const wmx=await Promise.all(Array.from({length:w},(_,i)=>get(`${BASE}/league/${LEAGUE_ID}/matchups/${i+1}`).catch(()=>[])));
        setWeeklyMx(wmx);setProg(55);
        const wtx=await Promise.all(Array.from({length:w},(_,i)=>get(`${BASE}/league/${LEAGUE_ID}/transactions/${i+1}`).catch(()=>[])));
        setWeeklyTx(wtx);setAllTx(wtx.flat().filter(t=>t.status==='complete'));
        setLoaded(true);setProg(100);
        get(`${BASE}/league/${LEAGUE_ID}/drafts`).then(async drafts=>{
          if(!Array.isArray(drafts)||!drafts.length)return;
          const lat=drafts[drafts.length-1];
          const [di,picks]=await Promise.all([get(`${BASE}/draft/${lat.draft_id}`),get(`${BASE}/draft/${lat.draft_id}/picks`)]);
          setDraftData(di);setDraftPicks(Array.isArray(picks)?picks:[]);
        }).catch(()=>{});
        get(`${BASE}/players/nfl`).then(p=>setPlayers(p)).catch(()=>{});
      }catch(e){setErr(e.message);}
    })();
  },[]);

  const uMap=useMemo(()=>{const m={};users.forEach(u=>{m[u.user_id]=u;});return m;},[users]);
  const rMap=useMemo(()=>{const m={};rosters.forEach(r=>{m[r.roster_id]=r;});return m;},[rosters]);
  const gU=rid=>{const r=rMap[rid]||{};return uMap[r.owner_id]||{};};
  const gN=rid=>{const u=gU(rid);return u.metadata?.team_name||u.display_name||'Unknown';};
  const rFull=pid=>{if(!players)return{name:pid,pos:'',team:''};const p=players[pid];if(!p)return{name:pid,pos:'',team:''};return{name:`${p.first_name||''} ${p.last_name||''}`.trim()||pid,pos:p.position||'',team:p.team||'FA'};};

  const feed=useMemo(()=>loaded?buildFeed({weeklyMx,weeklyTx,userMap:uMap,rosterMap:rMap,players}):[]
    ,[loaded,weeklyMx,weeklyTx,uMap,rMap,players]);

  const streaks=useMemo(()=>loaded?detectStreaks({weeklyMx,rosterMap:rMap,userMap:uMap}):[]
    ,[loaded,weeklyMx,rMap,uMap]);

  const rankings=useMemo(()=>loaded?powerRankings({rosters,weeklyMx,userMap:uMap,rosterMap:rMap}):[]
    ,[loaded,rosters,weeklyMx,uMap,rMap]);

  const sorted=useMemo(()=>rosters.map(r=>{const u=uMap[r.owner_id]||{};return{...r,teamName:u.metadata?.team_name||u.display_name||'?',dn:u.display_name||'—',avatar:u.avatar};}).sort((a,b)=>{const d=(b.settings?.wins||0)-(a.settings?.wins||0);return d||((b.settings?.fpts||0)+(b.settings?.fpts_decimal||0)/100)-((a.settings?.fpts||0)+(a.settings?.fpts_decimal||0)/100);}),[rosters,uMap]);

  const mxPairs=useMemo(()=>{const wd=weeklyMx[mxWk-1]||[];const mm={};wd.forEach(m=>{if(!mm[m.matchup_id])mm[m.matchup_id]=[];mm[m.matchup_id].push(m);});return Object.values(mm).filter(p=>p.length===2).map(pair=>pair.map(m=>{const u=uMap[(rMap[m.roster_id]||{}).owner_id]||{};return{...m,tname:u.metadata?.team_name||u.display_name||'?',av:u.avatar};}));
  },[weeklyMx,mxWk,uMap,rMap]);

  const curTx=useMemo(()=>(weeklyTx[txWk-1]||[]).filter(t=>t.status==='complete'),[weeklyTx,txWk]);

  // Trade groups builder
  const buildTG=t=>{
    const g={};
    const ens=rid=>{const k=String(rid);if(!g[k]){const u=gU(rid);g[k]={rid,name:u.metadata?.team_name||u.display_name||'?',av:u.avatar,gets:{pl:[],pk:[]},gives:{pl:[],pk:[]}};}};
    (t.roster_ids||[]).forEach(rid=>ens(rid));
    Object.entries(t.adds||{}).forEach(([pid,rid])=>{ens(rid);g[String(rid)].gets.pl.push(pid);});
    Object.entries(t.drops||{}).forEach(([pid,rid])=>{ens(rid);g[String(rid)].gives.pl.push(pid);});
    (t.draft_picks||[]).forEach(pick=>{
      ens(pick.roster_id);ens(pick.owner_id);
      const ou=uMap[(rMap[pick.previous_owner_id]||{}).owner_id]||{};
      const on=ou.metadata?.team_name||ou.display_name||'?';
      const same=pick.previous_owner_id===pick.owner_id;
      g[String(pick.roster_id)].gets.pk.push({...pick,orig:same?null:on});
      g[String(pick.owner_id)].gives.pk.push({...pick,orig:same?null:on});
    });
    return Object.values(g);
  };

  // Pick player resolver
  const resolvePick=pick=>{
    if(!draftPicks.length||!draftData)return null;
    if(parseInt(pick.season)>parseInt(league?.season||'9999'))return null;
    const s2r=draftData.slot_to_roster_id||{};
    let slot=null;Object.entries(s2r).forEach(([s,r])=>{if(String(r)===String(pick.previous_owner_id))slot=parseInt(s);});
    if(!slot)return null;
    const m=draftPicks.find(dp=>dp.round===pick.round&&dp.draft_slot===slot);
    if(!m)return null;
    const md=m.metadata||{};
    const n=`${md.first_name||''} ${md.last_name||''}`.trim();
    return n?{name:n,pos:md.position||'',team:md.team||''}:null;
  };

  // Draft board
  const draftBoard=useMemo(()=>{
    if(!draftData||!draftPicks.length)return null;
    const nt=draftData.settings?.teams||rosters.length;
    const nr=draftData.settings?.rounds||15;
    const s2r=draftData.slot_to_roster_id||{};
    const hdrs=Array.from({length:nt},(_,i)=>{const rid=s2r[String(i+1)]||s2r[i+1];return rid?gN(rid):`Slot ${i+1}`;});
    const grid=Array.from({length:nr},()=>Array(nt).fill(null));
    draftPicks.forEach(pick=>{const r=(pick.round||1)-1,s=(pick.draft_slot||1)-1;if(r>=0&&r<nr&&s>=0&&s<nt)grid[r][s]=pick;});
    const pcr={};rosters.forEach(r=>{(r.players||[]).forEach(pid=>{pcr[String(pid)]=r.roster_id;});});
    return{hdrs,grid,nt,nr,s2r,pcr};
  },[draftData,draftPicks,rosters,uMap,rMap]);

  // Newsletter
  const genNewsletter=async()=>{
    if(!apiKey.trim()){setNletter('__NK__');return;}
    setNlLoading(true);setNletter('');
    const sText=sorted.map((r,i)=>`${i+1}. ${r.teamName} (${r.settings?.wins||0}-${r.settings?.losses||0}) — ${((r.settings?.fpts||0)+(r.settings?.fpts_decimal||0)/100).toFixed(1)} PF`).join('\n');
    const mText=mxPairs.map(([a,b])=>`${a.tname} ${(a.points||0).toFixed(1)} vs ${b.tname} ${(b.points||0).toFixed(1)}`).join('\n');
    const tText=allTx.slice(0,12).map(t=>{const teams=(t.roster_ids||[]).map(rid=>gN(rid));if(t.type==='trade')return`TRADE: ${teams.join(' + ')}`;const adds=Object.keys(t.adds||{}).map(p=>rFull(p).name).join(', ');return`${t.type.toUpperCase()}: ${teams[0]} added ${adds}`;}).join('\n');
    const stText=streaks.map(s=>`${s.name}: ${s.sub}`).join('\n');
    const rkText=rankings.map((r,i)=>`${i+1}. ${r.name} ${r.arrow} (avg ${r.avg})`).join('\n');
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1300,messages:[{role:'user',content:`Witty, trash-talky commissioner newsletter for "${league.name}", Week ${curWk}.\n\nStandings:\n${sText}\n\nThis week's scores:\n${mText||'(none)'}\n\nPower Rankings:\n${rkText}\n\nActive streaks:\n${stText||'none'}\n\nRecent transactions:\n${tText||'none'}\n\nWrite 4-5 paragraphs. Name teams. Reference scores, streaks, trades. Roast bad decisions. End with a prediction. Plain text only.`}]})});
      const d=await res.json();
      if(d.error)throw new Error(d.error.message);
      setNletter(d.content?.map(c=>c.text||'').join('')||'No response.');
    }catch(e){setNletter('Error: '+e.message);}
    setNlLoading(false);
  };

  // Feed grouped by week
  const feedByWk=useMemo(()=>{
    const bw={};feed.forEach(e=>{if(!bw[e.wk])bw[e.wk]=[];bw[e.wk].push(e);});
    Object.values(bw).forEach(arr=>arr.sort((a,b)=>a.ord-b.ord));
    return Object.entries(bw).sort((a,b)=>parseInt(b[0])-parseInt(a[0]));
  },[feed]);

  const wkBar=(wk,setWk)=>(
    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10,flexWrap:'wrap'}}>
      <span style={{fontSize:11,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.05em'}}>Week</span>
      <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
        {Array.from({length:curWk},(_,i)=>i+1).map(w=><button key={w} className="btn" onClick={()=>setWk(w)} style={{padding:'1px 8px',fontSize:11,height:'auto',fontWeight:w===wk?700:400,background:w===wk?'var(--hdr)':'none',color:w===wk?'var(--hdr-text)':'var(--text)',borderColor:w===wk?'var(--hdr)':'var(--border2)'}}>{w}</button>)}
      </div>
    </div>
  );

  const sidebar=(
    <div className="sidebar-wrap">
      <div className="card cp sidebar">
        <div className="rank-hdr">⚡ Power Rankings</div>
        {rankings.map((t,i)=>(
          <div key={t.rid} className="rank-row">
            <span className="rn">{i+1}</span>
            <Av avatar={t.av} name={t.name} size={22}/>
            <span className="rname">{t.name}</span>
            <span className="rarrow" style={{color:t.aColor}}>{t.arrow}</span>
            <span className="ravg">{t.avg}</span>
          </div>
        ))}
        <div style={{marginTop:8,fontSize:10,color:'var(--t3)',lineHeight:1.5}}>Weighted W/L, scoring avg, last 3 weeks. Arrow vs. last week.</div>
      </div>
    </div>
  );

  const NAV=[{id:'feed',icon:'📡',label:'Feed'},{id:'rankings',icon:'📊',label:'Rankings'},{id:'standings',icon:'🏆',label:'Standings'},{id:'matchups',icon:'⚔️',label:'Matchups'},{id:'transactions',icon:'💼',label:'Moves'},{id:'draft',icon:'📋',label:'Draft'},{id:'newsletter',icon:'📰',label:'Newsletter'}];

  if(err)return<div className="loading"><div style={{color:'var(--red)',fontSize:14}}>{err}</div></div>;
  if(!loaded)return(
    <div className="loading">
      <Spin s={28}/>
      <div style={{fontSize:14,fontWeight:700}}>Loading your league…</div>
      <div className="prog"><div className="prog-fill" style={{width:prog+'%'}}/></div>
      <div style={{fontSize:11,color:'var(--t3)'}}>{prog<30?'Fetching league data…':prog<55?'Loading all weeks…':prog<80?'Pulling transactions…':'Finishing up…'}</div>
    </div>
  );

  return(
    <div>
      <header className="hdr">
        <div className="hdr-inner">
          <div>
            <div className="league-title">🏈 {league.name}</div>
            <div className="league-sub">{league.season} · {rosters.length} teams · Week {curWk}</div>
          </div>
          <nav className="nav-tabs">
            {NAV.map(n=><button key={n.id} className={`ntab${view===n.id?' on':''}`} onClick={()=>setView(n.id)}>{n.icon} {n.label}</button>)}
          </nav>
        </div>
      </header>

      {/* ── FEED ── */}
      {view==='feed'&&(
        <div className="page">
          <div className="main-col">
            {streaks.length>0&&(
              <div style={{marginBottom:'1rem'}}>
                <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--t3)',marginBottom:6}}>Active Right Now</div>
                <div className="streak-bar">
                  {streaks.map((s,i)=>(
                    <div key={i} className="spill" style={spStyle(s.type)}>
                      <span style={{fontWeight:700}}>{s.name}</span>
                      <span style={{opacity:.7,fontWeight:500,fontSize:10}}>{s.sub}</span>
                      <span style={{background:'rgba(0,0,0,.08)',borderRadius:10,padding:'1px 6px',fontSize:10}}>{s.detail}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {feedByWk.length===0
              ?<div className="card cp" style={{color:'var(--t3)',textAlign:'center'}}>No events yet — the feed fills up as the season progresses.</div>
              :feedByWk.map(([wk,evts])=>(
                <div key={wk}>
                  <div className="wk-div">Week {wk}</div>
                  {evts.map(e=><ECard key={e.id} ev={e}/>)}
                </div>
              ))
            }
          </div>
          {sidebar}
        </div>
      )}

      {/* ── RANKINGS ── */}
      {view==='rankings'&&(
        <div className="page wide">
          <div className="main-col">
            <div className="stat-grid">
              {rankings.map((t,i)=>{
                const streak=streaks.find(s=>String(s.rid)===String(t.rid));
                return(
                  <div key={t.rid} className="card rpc" style={{borderLeftColor:t.aColor}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                      <span style={{fontSize:22,fontWeight:800,color:'#e0deda',minWidth:28}}>{i+1}</span>
                      <Av avatar={t.av} name={t.name} size={30}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</div>
                        <div style={{fontSize:10,color:'var(--t3)'}}>{t.dn}</div>
                      </div>
                      <span style={{fontSize:20,fontWeight:800,color:t.aColor}}>{t.arrow}</span>
                    </div>
                    <div style={{display:'flex',gap:10}}>
                      <div><div className="slabel">Record</div><div style={{fontSize:16,fontWeight:800}}>{t.w}-{t.l}</div></div>
                      <div><div className="slabel">Avg Pts</div><div style={{fontSize:16,fontWeight:800}}>{t.avg}</div></div>
                      <div><div className="slabel">Last 3</div><div style={{fontSize:16,fontWeight:800}}>{t.last3}</div></div>
                    </div>
                    {streak&&<div style={{marginTop:7,fontSize:11,padding:'2px 8px',borderRadius:20,...spStyle(streak.type),display:'inline-block',fontWeight:600}}>{streak.sub}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ── STANDINGS ── */}
      {view==='standings'&&(
        <div className="page wide">
          <div className="card cp main-col">
            {sorted.map((r,i)=>{
              const pts=((r.settings?.fpts||0)+(r.settings?.fpts_decimal||0)/100).toFixed(1);
              const pa=((r.settings?.fpts_against||0)+(r.settings?.fpts_against_decimal||0)/100).toFixed(1);
              const pl=i<Math.ceil(rosters.length/2);
              return(
                <div key={r.roster_id} className="srow">
                  <span style={{width:22,fontSize:13,fontWeight:700,color:pl?'var(--green)':'#ccc',textAlign:'center',flexShrink:0}}>{i+1}</span>
                  <Av avatar={r.avatar} name={r.teamName} size={32}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.teamName}</div>
                    <div style={{fontSize:11,color:'var(--t3)'}}>{r.dn}</div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <div style={{fontSize:15,fontWeight:800}}>{r.settings?.wins||0}-{r.settings?.losses||0}</div>
                    <div style={{fontSize:11,color:'var(--t3)'}}>{pts} PF · {pa} PA</div>
                  </div>
                </div>
              );
            })}
            <div style={{marginTop:8,fontSize:11,color:'var(--t3)'}}>Green = playoff positions. PF = points for, PA = points against.</div>
          </div>
        </div>
      )}

      {/* ── MATCHUPS ── */}
      {view==='matchups'&&(
        <div className="page wide">
          <div className="main-col">
            {wkBar(mxWk,setMxWk)}
            {mxPairs.length===0?<div className="card cp" style={{color:'var(--t3)'}}>No matchup data for week {mxWk}.</div>
            :mxPairs.map(([a,b],i)=>{
              const aW=(a.points||0)>(b.points||0),bW=(b.points||0)>(a.points||0);
              return(
                <div key={i} className="card mcard" style={{marginBottom:8}}>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3}}><Av avatar={a.av} name={a.tname} size={22}/><span style={{fontSize:13,fontWeight:700,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.tname}</span></div>
                    <div style={{fontSize:28,fontWeight:800,color:aW?'var(--text)':'#ccc',lineHeight:1}}>{(a.points||0).toFixed(2)}</div>
                  </div>
                  <div style={{fontSize:10,color:'#ccc',flexShrink:0,fontWeight:700}}>VS</div>
                  <div style={{flex:1,textAlign:'right'}}>
                    <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3,justifyContent:'flex-end'}}><span style={{fontSize:13,fontWeight:700,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'right'}}>{b.tname}</span><Av avatar={b.av} name={b.tname} size={22}/></div>
                    <div style={{fontSize:28,fontWeight:800,color:bW?'var(--text)':'#ccc',lineHeight:1}}>{(b.points||0).toFixed(2)}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── TRANSACTIONS ── */}
      {view==='transactions'&&(
        <div className="page wide">
          <div className="main-col">
            {wkBar(txWk,setTxWk)}
            {curTx.length===0?<div className="card cp" style={{color:'var(--t3)'}}>No transactions week {txWk}.</div>
            :curTx.map((t,i)=>{
              const isTrade=t.type==='trade';
              const tg=isTrade?buildTG(t):null;
              const adds=Object.keys(t.adds||{});const drops=Object.keys(t.drops||{});
              const ts=fmtTs(t.status_updated||t.created);const faab=t.settings?.waiver_bid;
              return(
                <div key={i} className={`card txcard ${isTrade?'purple':t.type==='waiver'?'amber':'green'}`} style={{borderLeftColor:isTrade?'#8b5cf6':t.type==='waiver'?'#f59e0b':'#22c55e'}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:9,flexWrap:'wrap'}}>
                    <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:4,background:isTrade?'#f5f3ff':t.type==='waiver'?'#fffbeb':'#f0fdf4',color:isTrade?'#7c3aed':t.type==='waiver'?'#d97706':'#16a34a'}}>{isTrade?`Trade · ${(t.roster_ids||[]).length}-team`:t.type==='waiver'?'Waiver':'Free Agent'}</span>
                    {faab!=null&&<span style={{fontSize:10,padding:'2px 7px',borderRadius:4,background:'#fffbeb',color:'#d97706',fontWeight:700}}>${faab} FAAB</span>}
                    {ts&&<span style={{fontSize:10,color:'var(--t3)'}}>{ts}</span>}
                  </div>
                  {isTrade&&tg&&(
                    <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(tg.length,3)},1fr)`,gap:8}}>
                      {tg.map((g,gi)=>(
                        <div key={gi} className="tx-inner">
                          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:7,paddingBottom:6,borderBottom:'.5px solid rgba(0,0,0,.06)'}}>
                            <Av avatar={g.av} name={g.name} size={20}/>
                            <div style={{minWidth:0}}><div style={{fontSize:12,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{g.name}</div><div style={{fontSize:9,color:'var(--t3)'}}>receives</div></div>
                          </div>
                          {g.gets.pl.map(pid=>{const{name,pos,team}=rFull(pid);return(<div key={pid} style={{display:'flex',gap:5,marginBottom:4,alignItems:'flex-start'}}><span style={{color:'var(--green)',fontWeight:800,flexShrink:0,fontSize:12}}>+</span><div><div style={{fontSize:12,fontWeight:700}}>{name}</div>{pos&&<div style={{fontSize:10,color:'var(--t3)'}}>{pos}{team?` · ${team}`:''}</div>}</div></div>);})}
                          {g.gets.pk.map((pk,pi)=>{const d=resolvePick(pk);const fut=parseInt(pk.season)>parseInt(league?.season||'0');return(<div key={pi} style={{display:'flex',gap:5,marginBottom:4,alignItems:'flex-start'}}><span style={{color:'var(--blue)',fontWeight:800,flexShrink:0,fontSize:12}}>+</span><div><div style={{fontSize:12,fontWeight:700,color:'var(--blue)'}}>{pk.season} Round {pk.round}</div>{pk.orig&&<div style={{fontSize:10,color:'var(--t3)'}}>orig. {pk.orig}</div>}{d?<div style={{fontSize:11,color:'var(--green)',fontWeight:600}}>→ {d.name}{d.pos?` (${d.pos})`:''}</div>:!fut&&<div style={{fontSize:10,color:'var(--t3)'}}>result unavailable</div>}</div></div>);})}
                          {!g.gets.pl.length&&!g.gets.pk.length&&<div style={{fontSize:10,color:'var(--t3)'}}>No incoming assets</div>}
                          {(g.gives.pl.length>0||g.gives.pk.length>0)&&(
                            <div style={{marginTop:7,paddingTop:5,borderTop:'.5px solid rgba(0,0,0,.06)'}}>
                              <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.03em',color:'var(--t3)',marginBottom:4}}>gave away</div>
                              {g.gives.pl.map(pid=>{const{name,pos}=rFull(pid);return(<div key={pid} style={{display:'flex',gap:5,marginBottom:2,alignItems:'center'}}><span style={{color:'var(--red)',fontWeight:800,flexShrink:0,fontSize:12}}>−</span><span style={{fontSize:11,color:'var(--t2)'}}>{name}{pos?` (${pos})`:''}</span></div>);})}
                              {g.gives.pk.map((pk,pi)=>{const d=resolvePick(pk);return(<div key={pi} style={{display:'flex',gap:5,marginBottom:2,alignItems:'flex-start'}}><span style={{color:'var(--red)',fontWeight:800,flexShrink:0,fontSize:12}}>−</span><div style={{fontSize:11,color:'var(--t2)'}}>{pk.season} Rd {pk.round}{d?` → ${d.name}`:''}</div></div>);})}
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                  {!isTrade&&(
                    <div className="tx-inner">
                      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:7,paddingBottom:6,borderBottom:'.5px solid rgba(0,0,0,.06)'}}><Av avatar={gU(t.roster_ids?.[0]).avatar} name={gN(t.roster_ids?.[0])} size={20}/><span style={{fontSize:12,fontWeight:700}}>{gN(t.roster_ids?.[0])}</span></div>
                      {adds.map(pid=>{const{name,pos,team}=rFull(pid);return(<div key={pid} style={{display:'flex',gap:5,marginBottom:4,alignItems:'flex-start'}}><span style={{color:'var(--green)',fontWeight:800,flexShrink:0}}>+</span><div><div style={{fontSize:12,fontWeight:700}}>{name}</div>{pos&&<div style={{fontSize:10,color:'var(--t3)'}}>{pos}{team?` · ${team}`:''}</div>}</div></div>);})}
                      {drops.map(pid=>{const{name,pos}=rFull(pid);return(<div key={pid} style={{display:'flex',gap:5,marginBottom:2,alignItems:'center'}}><span style={{color:'var(--red)',fontWeight:800,flexShrink:0}}>−</span><span style={{fontSize:11,color:'var(--t2)'}}>{name}{pos?` (${pos})`:''}</span></div>);})}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── DRAFT ── */}
      {view==='draft'&&(
        <div className="page wide">
          <div className="main-col">
            {!draftData?<div className="card cp" style={{color:'var(--t3)',display:'flex',gap:8,alignItems:'center'}}><Spin s={16}/>Loading draft…</div>
            :<div>
              <div className="card cp" style={{marginBottom:8}}>
                <div style={{fontSize:15,fontWeight:700,marginBottom:2}}>{draftData.season} Draft</div>
                <div style={{fontSize:12,color:'var(--t3)'}}>{draftData.type} · {draftData.settings?.rounds} rounds · {draftData.settings?.teams} teams{draftData.status==='complete'?' · Complete':''}</div>
              </div>
              {!draftBoard||!draftPicks.length?<div className="card cp" style={{color:'var(--t3)'}}>No picks recorded.</div>
              :<div className="card">
                <div className="draftw">
                  <table style={{tableLayout:'fixed',minWidth:`${36+draftBoard.nt*90}px`}}>
                    <colgroup><col style={{width:36}}/>{draftBoard.hdrs.map((_,i)=><col key={i} style={{width:90}}/>)}</colgroup>
                    <thead><tr><th>Rd</th>{draftBoard.hdrs.map((h,i)=><th key={i} style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
                    <tbody>
                      {draftBoard.grid.map((row,ri)=>(
                        <tr key={ri} style={{background:ri%2===0?'#fff':'#fafaf9'}}>
                          <td style={{fontWeight:700,color:'#ccc',background:ri%2===0?'#fff':'#fafaf9'}}>{ri+1}</td>
                          {row.map((pick,si)=>{
                            if(!pick)return<td key={si} style={{color:'#ddd'}}>—</td>;
                            const m=pick.metadata||{};
                            const name=`${m.first_name||''} ${m.last_name||''}`.trim()||pick.player_id;
                            const drid=draftBoard.s2r[String(si+1)]||draftBoard.s2r[si+1];
                            const crid=draftBoard.pcr[String(pick.player_id)];
                            const traded=crid&&String(crid)!==String(drid);
                            const released=!crid;
                            return(
                              <td key={si} style={{verticalAlign:'top',background:traded?'#eff6ff':released?'#fef2f2':'inherit'}}>
                                <div style={{fontWeight:700,fontSize:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</div>
                                {m.position&&<div style={{fontSize:9,color:'var(--t3)'}}>{m.position}{m.team?` · ${m.team}`:''}</div>}
                                {traded&&<div style={{fontSize:9,color:'var(--blue)',fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>→ {gN(crid)}</div>}
                                {released&&<div style={{fontSize:9,color:'var(--red)'}}>released</div>}
                              </td>
                            );
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div style={{padding:'6px 10px',display:'flex',gap:12,borderTop:'.5px solid var(--border)'}}>
                  <span style={{fontSize:10,color:'var(--t3)',display:'flex',alignItems:'center',gap:3}}><span style={{width:9,height:9,background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:2,display:'inline-block'}}/>Traded away</span>
                  <span style={{fontSize:10,color:'var(--t3)',display:'flex',alignItems:'center',gap:3}}><span style={{width:9,height:9,background:'#fef2f2',border:'1px solid #fecaca',borderRadius:2,display:'inline-block'}}/>Released</span>
                </div>
              </div>}
            </div>}
          </div>
        </div>
      )}

      {/* ── NEWSLETTER ── */}
      {view==='newsletter'&&(
        <div className="page wide">
          <div className="main-col">
            <div className="card cp" style={{marginBottom:8}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:3}}>Anthropic API Key</div>
              <div style={{fontSize:11,color:'var(--t3)',marginBottom:10,lineHeight:1.6}}>Required to generate newsletters. Get one free at <a href="https://console.anthropic.com" target="_blank" style={{color:'var(--blue)'}}>console.anthropic.com</a> → API Keys. ~$0.01 per newsletter, saved in your browser.</div>
              <div style={{display:'flex',gap:6}}>
                <input className="inpp" type={showK?'text':'password'} placeholder="sk-ant-..." value={apiKey} onChange={e=>saveK(e.target.value)}/>
                <button className="btn" onClick={()=>setShowK(s=>!s)}>{showK?'Hide':'Show'}</button>
                <button className="btn dark" onClick={genNewsletter} disabled={nlLoading||!apiKey.trim()}>{nlLoading?'Writing…':'Generate'}</button>
              </div>
            </div>
            {nlLoading&&<div style={{display:'flex',gap:8,alignItems:'center',color:'var(--t3)',padding:'.75rem 0',fontSize:13}}><Spin s={16}/>Writing with full league context…</div>}
            {nletter==='__NK__'&&<div style={{color:'var(--amber)',fontSize:12,padding:'.5rem 0'}}>Enter your Anthropic API key above to generate newsletters.</div>}
            {nletter&&nletter!=='__NK__'&&!nlLoading&&(
              <div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <span style={{fontSize:11,color:'var(--t3)'}}>Week {curWk} newsletter — copy and paste to send</span>
                  <button className="btn" style={{fontSize:11,padding:'2px 9px',height:'auto'}} onClick={()=>{try{navigator.clipboard.writeText(nletter)}catch{}}}>Copy</button>
                </div>
                <div className="card cp" style={{fontSize:13,lineHeight:1.85,whiteSpace:'pre-wrap'}}>{nletter}</div>
              </div>
            )}
            {!nletter&&!nlLoading&&<div className="card cp" style={{color:'var(--t3)',fontSize:13,textAlign:'center'}}>Generates from standings, all {curWk} weeks of scores, active streaks, power rankings, and recent transactions.</div>}
          </div>
        </div>
      )}

      <nav className="mob-nav">
        <div className="mob-nav-row">
          {NAV.slice(0,5).map(n=>(
            <button key={n.id} className={`mnb${view===n.id?' on':''}`} onClick={()=>setView(n.id)}>
              <span className="ico">{n.icon}</span>
              <span>{n.label}</span>
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
