<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --hdr:#111110;--ht:#f0eeea;
  --bg:#e8e7e4;--sf:#ffffff;
  --bd:rgba(0,0,0,0.07);--bd2:rgba(0,0,0,0.14);
  --tx:#111110;--t2:#6b6b67;--t3:#b0aeab;
  --green:#16a34a;--gbg:#f0fdf4;
  --red:#dc2626;--rbg:#fef2f2;
  --blue:#2563eb;--bbg:#eff6ff;
  --amber:#d97706;--abg:#fffbeb;
  --orange:#ea580c;--obg:#fff7ed;
  --purple:#7c3aed;--pbg:#f5f3ff;
  --r:10px;--rl:14px;
  --shadow:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --shadow-md:0 4px 14px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
/* Header */
.hdr{background:var(--hdr);color:var(--ht);position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.06)}
.hdr-i{max-width:1140px;margin:0 auto;padding:0 1.25rem;height:54px;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.ltitle{font-size:15px;font-weight:700;letter-spacing:-.01em}
.lsub{font-size:11px;opacity:.5;margin-top:1px}
.nav{display:flex;gap:1px}
.ntab{background:none;border:none;color:var(--ht);opacity:.55;font-size:12px;font-weight:600;padding:5px 10px;cursor:pointer;border-radius:6px;font-family:inherit;letter-spacing:.01em;height:auto;white-space:nowrap}
.ntab:hover{opacity:.85;background:rgba(255,255,255,.07)}
.ntab.on{opacity:1;background:rgba(255,255,255,.12)}
/* Season bar */
.szn-bar{background:rgba(255,255,255,.05);border-top:1px solid rgba(255,255,255,.06)}
.szn-i{max-width:1140px;margin:0 auto;padding:0 1.25rem;height:34px;display:flex;align-items:center;gap:4px;overflow-x:auto}
.szntab{background:none;border:none;color:var(--ht);opacity:.45;font-size:11px;font-weight:700;padding:3px 10px;cursor:pointer;border-radius:4px;font-family:inherit;white-space:nowrap;height:auto}
.szntab:hover{opacity:.7}
.szntab.on{opacity:1;background:rgba(255,255,255,.15)}
.szntab.loading{opacity:.4}
/* Mobile nav */
.mnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--hdr);border-top:1px solid rgba(255,255,255,.08);z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.mnav-r{display:flex;height:52px}
.mnb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--ht);opacity:.45;font-size:9px;font-weight:700;letter-spacing:.03em;cursor:pointer;font-family:inherit;text-transform:uppercase}
.mnb .ico{font-size:16px;line-height:1}
.mnb.on{opacity:1}
/* Layout */
.pg{max-width:1140px;margin:0 auto;padding:1.25rem;display:grid;grid-template-columns:1fr 360px;gap:1.1rem;align-items:start}
.pg.wide{grid-template-columns:1fr}
/* Cards */
.card{background:var(--sf);border-radius:var(--rl);border:.5px solid var(--bd);box-shadow:var(--shadow)}
.cp{padding:1.25rem 1.5rem}
/* Event cards */
.ec{background:var(--sf);border-radius:var(--rl);border:.5px solid var(--bd);border-left:4px solid transparent;padding:1rem 1.1rem;margin-bottom:.6rem;box-shadow:var(--shadow);transition:box-shadow .15s}
.ec:hover{box-shadow:var(--shadow-md)}
.ec.amber{border-left-color:#f59e0b}
.ec.green{border-left-color:#22c55e}
.ec.blue{border-left-color:#3b82f6}
.ec.red{border-left-color:#ef4444}
.ec.orange{border-left-color:#f97316}
.ec.purple{border-left-color:#8b5cf6}
.ec.gray{border-left-color:#d1d5db}
.ec-top{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.3rem}
.ec-badge{font-size:10px;font-weight:700;letter-spacing:.05em;padding:2px 9px;border-radius:20px}
.ec-wk{font-size:11px;color:var(--t3)}
.ec-title{font-size:15px;font-weight:800;line-height:1.35;margin-bottom:.2rem;letter-spacing:-.01em}
.ec-body{font-size:12px;color:var(--t2);line-height:1.5}
.ec-chips{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.45rem}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;background:#ededeb;color:var(--t2);font-weight:600}
.wkdiv{display:flex;align-items:center;gap:.65rem;margin:1.1rem 0 .65rem;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--t3)}
.wkdiv::after{content:'';flex:1;height:1px;background:var(--bd)}
/* Streak pills */
.sbar{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.9rem}
.spill{display:flex;align-items:center;gap:.35rem;font-size:11px;font-weight:600;padding:5px 10px;border-radius:20px;box-shadow:var(--shadow)}
/* Sidebar */
.sdbar-wrap{position:sticky;top:90px;align-self:start;max-height:calc(100vh - 100px);overflow-y:auto;scrollbar-width:none}
.sdbar-wrap::-webkit-scrollbar{display:none}
.rk-hdr{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:.7rem}
.rk-row{display:flex;align-items:center;gap:.45rem;padding:5px 0;border-bottom:.5px solid var(--bd)}
.rk-row:last-child{border-bottom:none}
/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:65vh;gap:.75rem}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{border:3px solid #e0deda;border-top-color:var(--hdr);border-radius:50%;animation:spin .75s linear infinite;flex-shrink:0}
.prog{width:180px;height:3px;background:#e0deda;border-radius:2px;overflow:hidden}
.prog-f{height:100%;background:var(--hdr);border-radius:2px;transition:width .3s}
/* Avatar */
.av{border-radius:50%;background:#e0deda;display:flex;align-items:center;justify-content:center;font-weight:700;color:#888;overflow:hidden;flex-shrink:0}
/* Standings */
.srow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--bd)}
.srow:last-child{border-bottom:none}
/* Draft */
.draftw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:5px 8px;border-bottom:.5px solid var(--bd);font-size:11px}
th{font-weight:700;color:var(--t3);font-size:10px;text-transform:uppercase;letter-spacing:.04em;background:var(--sf)}

input.inp,input.inpp{background:#f5f3ef;border:.5px solid var(--bd2);border-radius:var(--r);color:var(--tx);font-size:13px;padding:7px 10px;height:34px;outline:none;font-family:inherit}
input.inp{width:100%}
input.inpp{flex:1}
button.btn{background:none;border:.5px solid var(--bd2);border-radius:var(--r);color:var(--tx);font-size:13px;font-family:inherit;padding:5px 12px;height:34px;cursor:pointer;white-space:nowrap}
button.btn:hover:not(:disabled){background:#f0eeea}
button.btn:disabled{opacity:.4;cursor:not-allowed}
button.btn.dk{background:var(--hdr);color:var(--ht);border-color:var(--hdr)}
/* Week bar */
.wkbar{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.wkbtn{padding:1px 7px;font-size:11px;height:auto;white-space:nowrap}
/* Power ranking cards */
.rkcard{border-radius:var(--rl);border:.5px solid var(--bd);background:var(--sf);margin-bottom:.65rem;overflow:hidden;display:flex;align-items:stretch;box-shadow:var(--shadow);transition:box-shadow .15s}
.rkcard:hover{box-shadow:var(--shadow-md)}
.rkcard-accent{width:6px;flex-shrink:0}
.rkcard-body{flex:1;padding:1rem 1.25rem}
.rkcard-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.rk-badge{width:38px;height:38px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0}
.rkcard-stats{display:flex;gap:20px;flex-wrap:wrap}
.rkstat{display:flex;flex-direction:column;gap:1px}
.rkstat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t3)}
.rkstat-val{font-size:16px;font-weight:800}
.top3-row{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:8px}

.team-grid{display:flex;flex-direction:column;gap:8px;margin-top:1rem}
.team-card{background:var(--sf);border-radius:var(--rl);border:.5px solid var(--bd);box-shadow:var(--shadow);padding:.9rem 1.25rem;cursor:pointer;transition:box-shadow .15s,transform .15s;display:flex;align-items:center;gap:14px}

.result-card{border-radius:var(--rl);border:.5px solid var(--bd);overflow:hidden;margin-bottom:8px;box-shadow:var(--shadow)}
/* Storyline card */
.storyline-card{background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 100%);border-radius:var(--rl);border:.5px solid #312e81;box-shadow:0 4px 16px rgba(99,102,241,.2);padding:1.1rem 1.25rem;margin-bottom:.65rem}
.storyline-badge{font-size:10px;fontWeight:800;text-transform:uppercase;letter-spacing:.07em;color:#a5b4fc;margin-bottom:.5rem}
/* News box */
.news-item{padding:8px 0;border-bottom:.5px solid var(--bd);cursor:pointer}
.news-item:last-child{border-bottom:none}
.news-item:hover .news-title{color:var(--blue)}
.news-title{font-size:12px;font-weight:700;line-height:1.4;color:var(--tx);transition:color .12s}
.news-time{font-size:10px;color:var(--t3);margin-top:2px}
/* History tab */
.hist-table{width:100%;border-collapse:collapse;margin-top:.5rem}
.hist-table th{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);padding:6px 10px;border-bottom:1px solid var(--bd);text-align:left;background:var(--bg)}
.hist-table td{font-size:13px;padding:9px 10px;border-bottom:.5px solid var(--bd)}
.hist-table tr:last-child td{border-bottom:none}
.hist-table tr:hover td{background:var(--bg)}
/* Responsive */
@media(max-width:760px){
  .pg{grid-template-columns:1fr;padding:.9rem}
  .sdbar-wrap{display:none}
  .mnav{display:block}
  body{padding-bottom:56px}
  .hdr-i{padding:0 1rem}
  .nav{display:none}
  .rkcard-stats{gap:14px}

  /* 1. Mobile nav — scrollable, all tabs visible */
  .mnav-r{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;justify-content:flex-start;padding:0 4px}
  .mnav-r::-webkit-scrollbar{display:none}
  .mnb{min-width:60px;flex:0 0 60px;font-size:8px;padding:0 2px}
  .mnb .ico{font-size:15px}

  /* 2. Trade sides — stack vertically */
  .trade-sides{flex-direction:column!important}
  .trade-sides>div{border-right:none!important;border-bottom:.5px solid var(--bd)}
  .trade-sides>div:last-child{border-bottom:none}

  /* 3. History table — hide low-priority columns */
  .hist-table th:nth-child(7),.hist-table th:nth-child(8),.hist-table th:nth-child(9),
  .hist-table td:nth-child(7),.hist-table td:nth-child(8),.hist-table td:nth-child(9){display:none}
  .hist-table th,.hist-table td{padding:6px 6px;font-size:11px}

  /* 4. Banner — tighter text on small screens */
  .lg-banner{padding:1.25rem 1rem}
  .lg-banner-main{font-size:20px;word-break:break-word}

  /* 5. Draft pick header — wrap gracefully */
  .dpc-hdr{flex-wrap:wrap;gap:4px 6px}
  .dpc-hdr-pick{font-size:10px}
  .dpc-hdr-body{font-size:12px}
}
@media(min-width:761px){.mnav{display:none}}

// Rank → smooth green/yellow/red gradient
const rankColor=(rank,total)=>{
  const n=Math.max(total-1,1);
  const t=Math.min(1,Math.max(0,(rank-1)/n));
  const lerp=(a,b,u)=>Math.round(a+(b-a)*u);
  const G=[34,197,94],Y=[234,179,8],R=[239,68,68];
  let cr,cg,cb;
  if(t<=0.5){const u=t*2;cr=lerp(G[0],Y[0],u);cg=lerp(G[1],Y[1],u);cb=lerp(G[2],Y[2],u);}
  else{const u=(t-0.5)*2;cr=lerp(Y[0],R[0],u);cg=lerp(Y[1],R[1],u);cb=lerp(Y[2],R[2],u);}
  return`rgb(${cr},${cg},${cb})`;
};

const DraftPoll=({playerId,readOnly=false})=>{
  const [votes,setVotes]=useState(null);
  const [myVote,setMyVote]=useState(null);
  const fbPath=`/polls3/${playerId}`;
  const lsKey=`poll_v3_${playerId}`;
  const myKey=`my_vote_v3_${playerId}`;

  useEffect(()=>{
    let cancelled=false;
    const load=async()=>{
      // My vote is always local (prevents double-voting) — skip in readOnly
      if(!readOnly){
        try{const mv=localStorage.getItem(myKey);if(mv&&!cancelled)setMyVote(mv);}catch{}
      }
      let loaded=false;

      // 1. Firebase — truly shared across all visitors
      if(_db){
        try{
          const snap=await _db.ref(fbPath).get();
          if(!cancelled){
            setVotes(snap.exists()?snap.val():{A:0,B:0,C:0,D:0,F:0});
            loaded=true;
          }
        }catch(e){console.warn('Firebase read:',e);}
      }

      // 2. Claude artifact storage — shared within Claude.ai
      if(!loaded){
        try{
          const res=await window.storage.get(lsKey,true);
          if(!cancelled&&res?.value){setVotes(JSON.parse(res.value));loaded=true;}
        }catch{}
      }

      // 3. localStorage — per-browser fallback
      if(!loaded&&!cancelled){
        try{
          const local=localStorage.getItem(lsKey);
          setVotes(local?JSON.parse(local):{A:0,B:0,C:0,D:0,F:0});
        }catch{setVotes({A:0,B:0,C:0,D:0,F:0});}
      }
    };
    load();
    return()=>{cancelled=true;};
  },[]);

  const castVote=async(grade)=>{
    if(myVote||!votes)return;
    const next={...votes,[grade]:(votes[grade]||0)+1};
    setVotes(next);setMyVote(grade);
    // Always record this browser's choice locally
    try{localStorage.setItem(myKey,grade);}catch{}

    // 1. Firebase
    if(_db){
      try{await _db.ref(fbPath).set(next);return;}
      catch(e){console.warn('Firebase write:',e);}
    }
    // 2. Claude artifact storage
    try{await window.storage.set(lsKey,JSON.stringify(next),true);return;}catch{}
    // 3. localStorage
    try{localStorage.setItem(lsKey,JSON.stringify(next));}catch{}
  };

  if(votes===null)return(
    <div style={{borderTop:'1px solid rgba(255,255,255,.08)',marginTop:8,paddingTop:8,textAlign:'center'}}>
      <div style={{fontSize:9,color:'rgba(255,255,255,.25)'}}>Loading poll…</div>
    </div>
  );

  const total=Object.values(votes).reduce((a,b)=>a+b,0);

  return(
    <div style={{borderTop:'1px solid rgba(255,255,255,.1)',marginTop:8,paddingTop:8}}>
      <div style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.06em',color:'rgba(255,255,255,.45)',marginBottom:6}}>
        Draft Pick Grade:
      </div>
      {(!myVote&&!readOnly)?(
        // Voting buttons
        <div style={{display:'flex',gap:3}}>
          {GRADES.map(g=>(
            <button key={g} onClick={()=>castVote(g)} style={{
              flex:1,padding:'5px 0',border:'none',borderRadius:6,
              background:'rgba(255,255,255,.1)',color:'rgba(255,255,255,.8)',
              fontSize:11,fontWeight:800,cursor:'pointer',
              transition:'background .12s, transform .1s',fontFamily:'inherit',
            }}
            onMouseEnter={e=>{e.currentTarget.style.background=GRADE_COLOR[g];e.currentTarget.style.color='#fff';}}
            onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,.1)';e.currentTarget.style.color='rgba(255,255,255,.8)';}}
            >{g}</button>
          ))}
        </div>
      ):(
        // Results
        <div>
          {GRADES.map(g=>{
            const cnt=votes[g]||0;
            const pct=total>0?Math.round(cnt/total*100):0;
            const isMine=!readOnly&&g===myVote;
            return(
              <div key={g} style={{display:'flex',alignItems:'center',gap:5,marginBottom:4}}>
                <span style={{
                  width:14,height:14,borderRadius:3,
                  background:isMine?GRADE_COLOR[g]:'rgba(255,255,255,.1)',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  flexShrink:0,fontSize:8,fontWeight:800,
                  color:isMine?'#fff':'rgba(255,255,255,.4)',
                  outline:isMine?`2px solid ${GRADE_COLOR[g]}`:'none',
                  outlineOffset:1,
                }}>{g}</span>
                <div style={{flex:1,background:'rgba(255,255,255,.08)',borderRadius:3,height:5,overflow:'hidden'}}>
                  <div style={{
                    width:pct+'%',height:'100%',borderRadius:3,
                    background:isMine?GRADE_COLOR[g]:GRADE_COLOR[g]+'88',
                    transition:'width .5s cubic-bezier(.4,0,.2,1)',
                  }}/>
                </div>
                <span style={{fontSize:9,color:'rgba(255,255,255,.4)',width:22,textAlign:'right',fontWeight:600}}>{pct}%</span>
              </div>
            );
          })}
          <div style={{fontSize:9,color:'rgba(255,255,255,.25)',marginTop:3}}>
            {total} vote{total!==1?'s':''}
            {!readOnly&&myVote&&<span> · your grade: <span style={{color:GRADE_COLOR[myVote],fontWeight:800}}>{myVote}</span></span>}
          </div>
        </div>
      )}
    </div>
  );
};

// Cascading player photo — tries Sleeper thumb → Sleeper full → ESPN → styled initials
const PlayerPhoto=({playerId,espnId,name,pos,size=80,bg='#1e293b',accent='#64748b',style:extraStyle={}})=>{
  const [tried,setTried]=useState(0);
  const urls=[
    playerId&&`https://sleepercdn.com/content/nfl/players/thumb/${playerId}.jpg`,
    playerId&&`https://sleepercdn.com/content/nfl/players/${playerId}.jpg`,
    espnId&&`https://a.espncdn.com/combiner/i?img=/i/headshots/nfl/players/full/${espnId}.png&h=200&w=200`,
  ].filter(Boolean);
  if(!urls.length||tried>=urls.length){
    const sz=typeof size==='number'?size:44;
    const parts=(name||'?').trim().split(/\s+/);
    const initials=parts.length>=2
      ?parts[0].charAt(0).toUpperCase()+parts[parts.length-1].charAt(0).toUpperCase()
      :parts[0].charAt(0).toUpperCase();
    const initFontSize=Math.floor(sz*(initials.length>1?.32:.38))+'px';
    return(
      <div style={{
        width:size,height:size,
        background:`linear-gradient(145deg,${accent}55 0%,${bg} 100%)`,
        display:'flex',alignItems:'center',justifyContent:'center',
        flexShrink:0,...extraStyle,
      }}>
        <span style={{fontSize:initFontSize,fontWeight:800,color:'rgba(255,255,255,.9)',lineHeight:1,letterSpacing:'-.01em'}}>
          {initials}
        </span>
      </div>
    );
  }
  return(
    <img src={urls[tried]} alt={name} onError={()=>setTried(t=>t+1)}
      style={{width:size,height:size,objectFit:'cover',objectPosition:'top center',display:'block',
        background:`linear-gradient(145deg,${accent}33 0%,${bg} 100%)`,flexShrink:0,...extraStyle}}/>
  );
};

// ── Storyline Card ────────────────────────────────────────
// Auto-generates an AI narrative for a key league moment, caches in Firebase.
const StorylineCard=({storyKey,title,prompt})=>{
  const [story,setStory]=useState(null);
  const [loading,setLoading]=useState(true);
  const fbRef=`/storylines/${LEAGUE_ID}/${storyKey}`;

  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      // 1. Try Firebase cache
      if(_db){
        try{
          const snap=await _db.ref(fbRef).get();
          if(!cancelled&&snap.exists()){setStory(snap.val());setLoading(false);return;}
        }catch{}
      }
      // 2. Try to generate with saved API key
      const apiK=localStorage.getItem('ff_k')||'';
      if(!apiK){if(!cancelled)setLoading(false);return;}
      try{
        const res=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{'Content-Type':'application/json','x-api-key':apiK,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
          body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:prompt}]})
        });
        const dd=await res.json();
        if(dd.error)throw new Error(dd.error.message);
        const text=dd.content?.map(c=>c.text||'').join('')||'';
        if(!cancelled&&text){
          setStory(text);
          if(_db)try{await _db.ref(fbRef).set(text);}catch{}
        }
      }catch{}
      if(!cancelled)setLoading(false);
    })();
    return()=>{cancelled=true;};
  },[storyKey]);

  return(
    <div className="storyline-card">
      <div className="storyline-badge">📖 {title}</div>
      {loading?(
        <div style={{display:'flex',alignItems:'center',gap:8,color:'rgba(165,180,252,.5)',fontSize:12}}>
          <Spin s={14}/> Generating storyline…
        </div>
      ):story?(
        <div style={{fontSize:13,lineHeight:1.75,color:'rgba(224,231,255,.85)',fontStyle:'italic'}}>"{story}"</div>
      ):(
        <div style={{fontSize:12,color:'rgba(165,180,252,.4)'}}>

  );
};

function buildFeed({weeklyMx,weeklyTx,uMap,rMap,players,draftPicks,rosterMap,draftData,nflState}){
  const ev=[];
  // ── Constants declared up front so the for loop can reference them ──────────
  const draftBaseMs=(draftData?.start_time||0)*1000;
  const draftLastMs=(draftData?.last_picked||draftData?.start_time||0)*1000;
  const totalPicks=draftPicks?.length||0;
  const WEEK_MS=7*24*3600*1000;
  const draftEndMs=draftBaseMs+totalPicks*90000;
  // ─────────────────────────────────────────────────────────────────────────────
  const gT=rid=>{const u=uMap[(rMap[rid]||{}).owner_id]||{};return{name:u.metadata?.team_name||u.display_name||'Unknown',av:u.avatar};};
  const pN=pid=>{if(!players)return pid;const p=players[pid];return p?`${p.first_name||''} ${p.last_name||''}`.trim():pid;};
  const nWks=Math.max(weeklyMx.length,weeklyTx.length);
  for(let wi=0;wi<nWks;wi++){
    const wk=wi+1,wkLabel=`Week ${wk}`;
    const wData=weeklyMx[wi]||[];

    // ── Transactions (always — including offseason) ──
    (weeklyTx[wi]||[]).filter(t=>t.status==='complete').forEach(t=>{
      const teams=(t.roster_ids||[]).map(rid=>gT(rid).name);
      const ts=fmtTs(t.status_updated||t.created);
      if(t.type==='trade'){
        const adds=Object.keys(t.adds||{});const picks=t.draft_picks||[];
        const sample=adds.slice(0,2).map(p=>pN(p)).filter(Boolean);
        const assets=[...sample,picks.length?`${picks.length} pick${picks.length>1?'s':''}`:null].filter(Boolean);
        const tradeSides=(t.roster_ids||[]).map(rid=>{
          const u=uMap[(rMap[rid]||{}).owner_id]||{};
          const name=u.metadata?.team_name||u.display_name||'Unknown';
          const playerIds=Object.entries(t.adds||{}).filter(([,rcv])=>String(rcv)===String(rid)).map(([pid])=>pid);
          const pkLabels=(t.draft_picks||[]).filter(pk=>String(pk.owner_id)===String(rid)).map(pk=>{
            const r=['1st','2nd','3rd','4th'][pk.round-1]||`${pk.round}th`;
            return`${pk.season} ${r} round pick`;
          });
          return{rid,name,av:u.avatar,playerIds,picks:pkLabels};
        });
        const rawTs=t.status_updated||t.created||0;
        const txTs=rawTs>1e11?rawTs:rawTs*1000; // normalize seconds→ms if needed
        ev.push({id:`trade-${t.transaction_id||Math.random()}`,wk,wkLabel:ts||wkLabel,type:'trade',ord:1,sortTs:txTs,rosterIds:t.roster_ids||[],isTrade:true,tradeSides,title:`${teams.slice(0,2).join(' and ')} made a deal`,body:assets.length?`Moved: ${assets.join(', ')}${adds.length>2?` +${adds.length-2} more`:''}`:null,chips:teams,playerIds:adds.slice(0,4)});
      }else if(t.type==='waiver'||t.type==='free_agent'){
        const adds=Object.keys(t.adds||{}).map(p=>pN(p)).filter(Boolean);
        const drops=Object.keys(t.drops||{}).map(p=>pN(p)).filter(Boolean);
        const addIds=Object.keys(t.adds||{});
        const bid=t.settings?.waiver_bid;
        if(!adds.length)return;
        const rawTxTs=t.status_updated||t.created||0;
        const waiverTs=rawTxTs>1e11?rawTxTs:rawTxTs*1000;
        ev.push({id:`tx-${t.transaction_id||Math.random()}`,wk,wkLabel:ts||wkLabel,type:t.type,ord:6,sortTs:waiverTs,rosterIds:t.roster_ids||[],title:`${teams[0]||'A team'} made a move`,body:`Added ${adds.slice(0,2).join(', ')}${drops.length?`. Dropped ${drops[0]}.`:''}`,chips:[...adds.slice(0,2),bid!=null?`$${bid} FAAB`:null].filter(Boolean),playerIds:addIds.slice(0,4)});
      }
    });

    // ── Game events (only when scores exist) ──
    if(!Array.isArray(wData)||!wData.length)continue;
    const mm={};wData.forEach(m=>{if(!mm[m.matchup_id])mm[m.matchup_id]=[];mm[m.matchup_id].push(m);});
    const pairs=Object.values(mm).filter(p=>p.length===2&&(p[0].points>0||p[1].points>0));
    if(!pairs.length)continue;
    const scored=wData.filter(m=>m.points>0).map(m=>m.points);
    const sortedS=[...scored].sort((a,b)=>a-b);
    const median=sortedS[Math.floor(sortedS.length/2)]||0;
    const avg=scored.length?scored.reduce((a,b)=>a+b,0)/scored.length:0;
    const hi=Math.max(...scored);
    const hiM=wData.find(m=>m.points===hi);
    if(hiM){const t=gT(hiM.roster_id);ev.push({id:`king-${wk}`,wk,wkLabel,type:'king',ord:2,sortTs:draftEndMs+wk*WEEK_MS+2000,rosterIds:[hiM.roster_id],title:`${t.name} put up a monster week`,body:`${hi.toFixed(1)} points — the highest score of Week ${wk}.`,chips:[`${hi.toFixed(1)} pts`,`Avg: ${avg.toFixed(1)}`]});}
    const lo=Math.min(...scored);
    const loM=wData.find(m=>m.points===lo&&m.points>0);
    if(loM&&lo>0){const t=gT(loM.roster_id);ev.push({id:`goat-${wk}`,wk,wkLabel,type:'goat',ord:5,sortTs:draftEndMs+wk*WEEK_MS+5000,rosterIds:[loM.roster_id],title:`${t.name} had one to forget`,body:`Just ${lo.toFixed(1)} points — the week's lowest score.`,chips:[`${lo.toFixed(1)} pts`,`${(avg-lo).toFixed(1)} below avg`]});}
    pairs.forEach(([a,b])=>{
      const win=(a.points||0)>(b.points||0)?a:b;const lose=(a.points||0)<(b.points||0)?a:b;
      const wpts=win.points||0,lpts=lose.points||0;if(!wpts||!lpts)return;
      const margin=wpts-lpts;const wt=gT(win.roster_id),lt=gT(lose.roster_id);
      if(wpts<median&&median>0)ev.push({id:`lucky-${wk}-${win.roster_id}`,wk,wkLabel,type:'lucky',ord:3,sortTs:draftEndMs+wk*WEEK_MS+3000,rosterIds:[win.roster_id,lose.roster_id],title:`${wt.name} stole a win`,body:`Won with just ${wpts.toFixed(1)} — below the week's median of ${median.toFixed(1)}. ${lt.name} was somehow worse.`,chips:[`Won ${wpts.toFixed(1)}-${lpts.toFixed(1)}`]});
      if(lpts>median&&median>0)ev.push({id:`unlucky-${wk}-${lose.roster_id}`,wk,wkLabel,type:'unlucky',ord:3,sortTs:draftEndMs+wk*WEEK_MS+3000,rosterIds:[lose.roster_id,win.roster_id],title:`${lt.name} got robbed`,body:`Scored ${lpts.toFixed(1)} — above median — and still lost to ${wt.name}'s ${wpts.toFixed(1)}.`,chips:[`Lost ${lpts.toFixed(1)}-${wpts.toFixed(1)}`]});
      if(margin>30)ev.push({id:`blowout-${wk}-${win.roster_id}`,wk,wkLabel,type:'blowout',ord:4,sortTs:draftEndMs+wk*WEEK_MS+4000,rosterIds:[win.roster_id,lose.roster_id],title:`${wt.name} delivered a beatdown`,body:`Beat ${lt.name} by ${margin.toFixed(1)} points. Dominant.`,chips:[`${wpts.toFixed(1)}-${lpts.toFixed(1)}`,`+${margin.toFixed(1)}`]});
      if(margin>0&&margin<6)ev.push({id:`close-${wk}-${win.roster_id}`,wk,wkLabel,type:'close',ord:4,sortTs:draftEndMs+wk*WEEK_MS+4000,rosterIds:[win.roster_id,lose.roster_id],title:`${wt.name} survived by ${margin.toFixed(2)}`,body:`${lt.name} is still thinking about this one.`,chips:[`${wpts.toFixed(2)}-${lpts.toFixed(2)}`]});
    });
  }

  // ── Draft picks — individual events, each with sortTs ───────────────────────
  if(Array.isArray(draftPicks)&&draftPicks.length>0){
    const gTN=rid=>{const r=rosterMap[rid]||{};const u=uMap[r.owner_id]||{};return u.metadata?.team_name||u.display_name||'?';};
    const nTeams=Object.keys(rosterMap).length||12;
    draftPicks.forEach(pk=>{
      const m=pk.metadata||{};
      const pData=players?.[pk.player_id]||{};
      const pickInRound=((pk.pick_no-1)%nTeams)+1;
      ev.push({
        id:`pick-${pk.pick_no}`,
        type:'draft_pick',
        isDraftPick:true,
        wk:0,
        sortTs:DRAFT_TIMESTAMPS[pk.pick_no]||draftLastMs-(totalPicks-pk.pick_no),
        pick_no:pk.pick_no,
        pickLabel:`${pk.round}.${String(pickInRound).padStart(2,'0')}`,
        round:pk.round,
        player_id:pk.player_id,
        espn_id:pData.espn_id||m.espn_id||null,
        name:m.first_name?`${m.first_name} ${m.last_name||''}`.trim():pk.player_id,
        pos:m.position||'',
        nflTeam:m.team||'',
        college:pData.college||m.college||null,
        height:pData.height||null,
        weight:pData.weight||null,
        teamName:gTN(pk.roster_id),
        roster_id:pk.roster_id,
        rosterIds:[pk.roster_id],
      });
    });
    // Draft storyline event — appears just after the last pick
    if(draftData?.status==='complete'){
      ev.push({
        id:`draft-storyline`,
        type:'storyline',
        isStoryline:true,
        sortTs:draftLastMs+1000,
        wk:0,
        storyKey:`draft_${draftData?.season}`,
        title:`${draftData?.season} Draft Recap`,
        storyPrompt:`${draftData?.season} fantasy football draft just wrapped. Provide a short 2-sentence punchy recap. Be dramatic, name teams and players. No preamble or labels.`,
      });
    }
  }

  // ── Season/week announcements (only during active season) ─────────────────
  const st=nflState?.season_type;
  if(st==='regular'||st==='post'){
    ev.push({id:'season-start',type:'season_start',isAnnouncement:true,wk:1,
      sortTs:draftEndMs+WEEK_MS*0.5,
      title:`The ${nflState.season} Season Has Begun`,body:`${Object.keys(rosterMap).length} teams. One champion.`});
  }

  return ev;
}

function detectStreaks({weeklyMx,rMap,uMap}){
  const gN=rid=>{const u=uMap[(rMap[rid]||{}).owner_id]||{};return u.metadata?.team_name||u.display_name||'?';};
  const td={};
  weeklyMx.forEach((wData)=>{
    if(!Array.isArray(wData))return;
    const mm={};wData.forEach(m=>{if(!mm[m.matchup_id])mm[m.matchup_id]=[];mm[m.matchup_id].push(m);});
    Object.values(mm).filter(p=>p.length===2).forEach(([a,b])=>{
      if(!a.points&&!b.points)return;
      const aW=(a.points||0)>(b.points||0);
      [[a,aW],[b,!aW]].forEach(([m,won])=>{if(!td[m.roster_id])td[m.roster_id]=[];td[m.roster_id].push({pts:m.points||0,won});});
    });
  });
  const allPts=Object.values(td).flatMap(w=>w.map(x=>x.pts)).filter(p=>p>0);
  const avg=allPts.length?allPts.reduce((a,b)=>a+b,0)/allPts.length:100;
  const streaks=[];
  Object.entries(td).forEach(([rid,weeks])=>{
    if(!weeks.length)return;
    const rev=[...weeks].reverse();const name=gN(rid);
    let ws=0;for(const w of rev){if(w.won)ws++;else break;}
    let ls=0;for(const w of rev){if(!w.won)ls++;else break;}
    let hs=0;for(const w of rev){if(w.pts>avg)hs++;else break;}
    let cs=0;for(const w of rev){if(w.pts>0&&w.pts<avg)cs++;else break;}
    const stA=n=>rev.slice(0,n).reduce((a,b)=>a+b.pts,0)/n;
    if(ws>=3)streaks.push({rid,name,type:'hot_streak',count:ws,sub:`${ws}-game win streak`,detail:`${stA(ws).toFixed(1)} pts avg`});
    else if(ls>=3)streaks.push({rid,name,type:'cold_streak',count:ls,sub:`${ls}-game skid`,detail:`${stA(ls).toFixed(1)} pts avg`});
    if(hs>=3&&ws<3)streaks.push({rid,name,type:'scr_hot',count:hs,sub:`${hs} wks scoring above avg`,detail:`${stA(hs).toFixed(1)} pts avg`});
    if(cs>=3&&ls<3)streaks.push({rid,name,type:'scr_cold',count:cs,sub:`${cs} wks scoring below avg`,detail:`${stA(cs).toFixed(1)} pts avg`});
  });
  return streaks.sort((a,b)=>b.count-a.count);
}

// Load all data for a given league ID (works for current or historical)
async function loadSeasonData(leagueId,get){
  const [lg,us,rs,ns]=await Promise.all([get(`${BASE}/league/${leagueId}`),get(`${BASE}/league/${leagueId}/users`),get(`${BASE}/league/${leagueId}/rosters`),get(`${BASE}/state/nfl`)]);
  if(!lg?.league_id)throw new Error('League not found.');
  // For historical seasons, determine max week from season status
  // A complete season finished at playoffs; try up to week 18
  const isHistory=lg.status==='complete';
  const maxWk=isHistory?18:Math.max(1,ns.week||1);
  const [wmx,wtx]=await Promise.all([
    Promise.all(Array.from({length:maxWk},(_,i)=>get(`${BASE}/league/${leagueId}/matchups/${i+1}`).catch(()=>[]))),
    Promise.all(Array.from({length:maxWk},(_,i)=>get(`${BASE}/league/${leagueId}/transactions/${i+1}`).catch(()=>[])))
  ]);
  // Filter out empty weeks
  const activeWks=wmx.filter(w=>Array.isArray(w)&&w.length>0&&w.some(m=>m.points>0));
  const curWk=isHistory?activeWks.length:Math.max(1,ns.week||1);
  // Load draft + bracket
  let draftData=null,draftPicks=[],bracket=[];
  try{
    const drafts=await get(`${BASE}/league/${leagueId}/drafts`);
    if(Array.isArray(drafts)&&drafts.length){
      const lat=drafts[drafts.length-1];
      [draftData,draftPicks]=await Promise.all([get(`${BASE}/draft/${lat.draft_id}`),get(`${BASE}/draft/${lat.draft_id}/picks`)]);
      if(!Array.isArray(draftPicks))draftPicks=[];
    }
  }catch{}
  try{
    const b=await get(`${BASE}/league/${leagueId}/winners_bracket`);
    if(Array.isArray(b))bracket=b;
  }catch{}
  return{league:lg,users:us,rosters:rs,nflState:ns,weeklyMx:wmx,weeklyTx:wtx,allTx:wtx.flat().filter(t=>t.status==='complete'),curWk,draftData,draftPicks,bracket,loaded:true};
}

      const l3=(()=>{const r3=wkPts.slice(-3);return r3.length?(r3.reduce((a,b)=>a+b,0)/r3.length).toFixed(1):'—';})();
      // Top 3 scorers from current roster
      const top3=(r.players||[]).map(pid=>({pid,pts:playerSeasonPts[pid]||0})).filter(p=>p.pts>0).sort((a,b)=>b.pts-a.pts).slice(0,3).map(p=>{const f=rFull(p.pid);return{...f,pts:p.pts.toFixed(1)};});
      const prevRk=isCurrentSzn?(prevRanks[r.owner_id]||999):999;
      return{rid:r.roster_id,name,av,dn,wins,losses,avg,l3,top3,prevRk,ownerId:r.owner_id};
    });
    if(isCurrentSzn&&Object.keys(prevRanks).length>0){
      // Sort by previous season finish
      return teams.sort((a,b)=>a.prevRk-b.prevRk).map((t,i)=>({...t,rank:i+1}));
    }else{
      // Sort by current season record for historical
      return teams.sort((a,b)=>{const dw=b.wins-a.wins;if(dw)return dw;return(parseFloat(b.avg)||0)-(parseFloat(a.avg)||0);}).map((t,i)=>({...t,rank:i+1}));
    }
  },[d.loaded,d.rosters,d.weeklyMx,uMap,prevRanks,playerSeasonPts,activeSzn]);

  const prevSznLabel=seasonChain.length>1?seasonChain[1].season:null;

  const sorted=useMemo(()=>(d.rosters||[]).map(r=>{const u=uMap[r.owner_id]||{};return{...r,teamName:u.metadata?.team_name||u.display_name||'?',dn:u.display_name||'—',avatar:u.avatar};}).sort((a,b)=>{const dw=(b.settings?.wins||0)-(a.settings?.wins||0);if(dw)return dw;return((b.settings?.fpts||0)+(b.settings?.fpts_decimal||0)/100)-((a.settings?.fpts||0)+(a.settings?.fpts_decimal||0)/100);}),[d.rosters,uMap]);

  const curWk=d.curWk||1;
  const effectiveMxWk=Math.min(mxWk,curWk);
  const effectiveTxWk=Math.min(txWk,curWk);

  const mxPairs=useMemo(()=>{
    const wd=(d.weeklyMx||[])[effectiveMxWk-1]||[];
    const mm={};wd.forEach(m=>{if(!mm[m.matchup_id])mm[m.matchup_id]=[];mm[m.matchup_id].push(m);});
    return Object.values(mm).filter(p=>p.length===2).map(pair=>pair.map(m=>{const u=uMap[(rMap[m.roster_id]||{}).owner_id]||{};return{...m,tname:u.metadata?.team_name||u.display_name||'?',av:u.avatar};}));
  },[d.weeklyMx,effectiveMxWk,uMap,rMap]);

  const curTx=useMemo(()=>((d.weeklyTx||[])[effectiveTxWk-1]||[]).filter(t=>t.status==='complete'),[d.weeklyTx,effectiveTxWk]);

  // All-time H2H records across all loaded seasons (keyed by owner_id pairs)
  const h2hRecords=useMemo(()=>{
    const rec={};
    Object.values(cache).forEach(sd=>{
      if(!sd?.loaded)return;
      const srMap={};(sd.rosters||[]).forEach(r=>{srMap[r.roster_id]=r.owner_id;});
      (sd.weeklyMx||[]).forEach(wData=>{
        if(!Array.isArray(wData))return;
        const mm={};wData.forEach(m=>{if(!mm[m.matchup_id])mm[m.matchup_id]=[];mm[m.matchup_id].push(m);});
        Object.values(mm).filter(p=>p.length===2).forEach(([a,b])=>{
          if(!a.points&&!b.points)return;
          const ao=srMap[a.roster_id],bo=srMap[b.roster_id];
          if(!ao||!bo)return;
          const key=[ao,bo].sort().join('::');
          if(!rec[key])rec[key]={[ao]:0,[bo]:0};
          if((a.points||0)>(b.points||0))rec[key][ao]++;else rec[key][bo]++;
        });
      });
    });
    return rec;
  },[cache]);

  // League history aggregated across all loaded seasons
  const leagueHistory=useMemo(()=>{
    // Find champion roster_id from winners bracket (highest round, match 1)
    const bracketChamp=bracket=>{
      if(!bracket?.length)return null;
      const played=bracket.filter(m=>m.w!=null);
      if(!played.length)return null;
      const maxR=Math.max(...played.map(m=>m.r||0));
      return(played.filter(m=>m.r===maxR&&m.m===1)[0]||played.filter(m=>m.r===maxR)[0])?.w||null;
    };
    const byOwner={};
    const seasons=[];
    seasonChain.forEach(szn=>{
      const sd=cache[szn.id];
      if(!sd?.loaded)return;
      const suMap={};(sd.users||[]).forEach(u=>{suMap[u.user_id]=u;});
      const srMap={};(sd.rosters||[]).forEach(r=>{srMap[r.roster_id]=r.owner_id;});
      const sortedR=[...(sd.rosters||[])].sort((a,b)=>{
        const dw=(b.settings?.wins||0)-(a.settings?.wins||0);
        return dw||((b.settings?.fpts||0)-(a.settings?.fpts||0));
      });
      // Determine actual champion from bracket, fall back to top seed
      const champRid=bracketChamp(sd.bracket);
      const champRoster=champRid?sortedR.find(r=>String(r.roster_id)===String(champRid)):sortedR[0];
      const cu=suMap[champRoster?.owner_id]||{};
      const champName=cu.metadata?.team_name||cu.display_name||'?';
      const complete=sd.league?.status==='complete';
      seasons.push({season:szn.season,id:szn.id,champion:champName,champOwnerId:champRoster?.owner_id,complete,teams:sortedR.length});
      // Initialize owner entries
      sortedR.forEach(r=>{
        const u=suMap[r.owner_id]||{};
        const name=u.metadata?.team_name||u.display_name||'Unknown';
        const oid=r.owner_id;
        if(!byOwner[oid])byOwner[oid]={oid,name,wins:0,losses:0,pf:0,seasons:0,championships:0,playoffWins:0,playoffLosses:0,playoffApps:0};
        const o=byOwner[oid];
        o.name=name;
        o.wins+=r.settings?.wins||0;
        o.losses+=r.settings?.losses||0;
        o.pf+=(r.settings?.fpts||0)+(r.settings?.fpts_decimal||0)/100;
        o.seasons++;
      });
      // Championship
      const coid=champRoster?.owner_id;
      if(complete&&coid&&byOwner[coid])byOwner[coid].championships++;
      // Playoff records
      const pStart=sd.league?.settings?.playoff_week_start;
      if(pStart){
        (sd.weeklyMx||[]).forEach((wData,wi)=>{
          const wk=wi+1;if(wk<pStart)return;
          if(!Array.isArray(wData))return;
          const mm={};wData.forEach(m=>{if(!mm[m.matchup_id])mm[m.matchup_id]=[];mm[m.matchup_id].push(m);});
          // Playoff appearances: count unique rosters in first playoff week
          if(wk===pStart){
            Object.values(mm).flat().forEach(m=>{
              const oid=srMap[m.roster_id];
              if(oid&&byOwner[oid]&&m.points>0)byOwner[oid].playoffApps++;
            });
          }
          Object.values(mm).filter(p=>p.length===2).forEach(([a,b])=>{
            if(!a.points&&!b.points)return;
            const ao=srMap[a.roster_id],bo=srMap[b.roster_id];
            if(!ao||!bo||!byOwner[ao]||!byOwner[bo])return;
            if((a.points||0)>(b.points||0)){byOwner[ao].playoffWins++;byOwner[bo].playoffLosses++;}
            else{byOwner[bo].playoffWins++;byOwner[ao].playoffLosses++;}
          });
        });
      }
    });
    const standings=Object.values(byOwner).sort((a,b)=>b.wins-a.wins);
    return{standings,seasons:seasons.reverse()};
  },[seasonChain,cache]);

  const feed=useMemo(()=>d.loaded?buildFeed({weeklyMx:d.weeklyMx||[],weeklyTx:d.weeklyTx||[],uMap,rMap,players,draftPicks:d.draftPicks||[],rosterMap:rMap,draftData:d.draftData,nflState:d.nflState}):[]
    ,[d.loaded,d.weeklyMx,d.weeklyTx,uMap,rMap,players,d.draftPicks,d.draftData,d.nflState]);

  const streaks=useMemo(()=>d.loaded?detectStreaks({weeklyMx:d.weeklyMx||[],rMap,uMap}):[]
    ,[d.loaded,d.weeklyMx,rMap,uMap]);

  // Flat chronological feed — fresh array sorted newest first
  const feedFlat=useMemo(()=>[...feed].sort((a,b)=>(b.sortTs||0)-(a.sortTs||0)),[feed]);

  // Build trade receive groups: for each team, what do they GET in the trade
  // adds[pid]=rid → rid receives that player. picks[].roster_id → rid receives that pick.
  const buildTradeReceives=t=>{
    const groups={};
    const ensure=rid=>{
      const k=String(rid);
      if(!groups[k]){const u=gU(rid);groups[k]={rid,name:u.metadata?.team_name||u.display_name||'Unknown',av:u.avatar,gets:{pl:[],pk:[]}};}
    };
    (t.roster_ids||[]).forEach(rid=>ensure(rid));
    // adds = what each team receives
    Object.entries(t.adds||{}).forEach(([pid,rid])=>{ensure(rid);groups[String(rid)].gets.pl.push(pid);});
    // picks: owner_id = who RECEIVES the pick after the trade
    // roster_id = original slot owner (whose pick it is in the draft order)
    (t.draft_picks||[]).forEach(pick=>{
      ensure(pick.owner_id);
      const origRoster=rMap[pick.roster_id]||{};
      const origUser=uMap[origRoster.owner_id]||{};
      const orig=origUser.metadata?.team_name||origUser.display_name||null;
      const isOwnSlot=String(pick.roster_id)===String(pick.owner_id);
      groups[String(pick.owner_id)].gets.pk.push({...pick,orig:isOwnSlot?null:orig});
    });
    // Only return teams that have at least something (filter out teams with nothing)
    const all=Object.values(groups);
    const withAssets=all.filter(g=>g.gets.pl.length>0||g.gets.pk.length>0);
    return withAssets.length>=2?withAssets:all;
  };

  const resolvePick=pick=>{
    const dp=d.draftPicks||[];const dd=d.draftData;
    if(!dp.length||!dd)return null;
    if(parseInt(pick.season)>parseInt(d.league?.season||'9999'))return null;
    const s2r=dd.slot_to_roster_id||{};
    // roster_id is the permanent slot owner — use it to find the draft slot number
    let slot=null;Object.entries(s2r).forEach(([s,r])=>{if(String(r)===String(pick.roster_id))slot=parseInt(s);});
    if(!slot)return null;
    const m=dp.find(p=>p.round===pick.round&&p.draft_slot===slot);
    if(!m)return null;
    const md=m.metadata||{};const n=`${md.first_name||''} ${md.last_name||''}`.trim();
    return n?{name:n,pos:md.position||'',team:md.team||''}:null;
  };

  // Draft board: team-centric view grouped by roster_id (actual drafter)
  const draftTeams=useMemo(()=>{
    const dp=d.draftPicks||[];const dd=d.draftData;
    if(!dd||!dp.length)return null;
    const s2r=dd.slot_to_roster_id||{};
    // Order teams by draft slot
    const slotOrder=Object.entries(s2r).sort((a,b)=>parseInt(a[0])-parseInt(b[0])).map(([,rid])=>String(rid));
    // Group picks by actual drafter (roster_id)
    const byTeam={};
    dp.forEach(pick=>{
      const rid=String(pick.roster_id);
      if(!byTeam[rid])byTeam[rid]=[];
      byTeam[rid].push(pick);
    });
    Object.values(byTeam).forEach(picks=>picks.sort((a,b)=>a.pick_no-b.pick_no));
    // Build current player locations
    const pcr={};(d.rosters||[]).forEach(r=>{(r.players||[]).forEach(pid=>{pcr[String(pid)]=r.roster_id;});});
    return slotOrder.map(rid=>({rid,teamName:gN(parseInt(rid)),avatar:gU(parseInt(rid)).avatar,picks:byTeam[rid]||[],pcr}));
  },[d.draftPicks,d.draftData,d.rosters,uMap,rMap]);

  // Newsletter generator
  const [nletter,setNletter]=useState('');const [nlLoading,setNlLoading]=useState(false);
  const genNl=async()=>{
    if(!apiKey.trim()){setNletter('__NK__');return;}
    setNlLoading(true);setNletter('');
    const sT=sorted.map((r,i)=>`${i+1}. ${r.teamName} (${r.settings?.wins||0}-${r.settings?.losses||0})`).join('\n');
    const mT=mxPairs.map(([a,b])=>`${a.tname} ${(a.points||0).toFixed(1)} vs ${b.tname} ${(b.points||0).toFixed(1)}`).join('\n');
    const tT=(d.allTx||[]).slice(0,10).map(t=>{const teams=(t.roster_ids||[]).map(rid=>gN(rid));if(t.type==='trade')return`TRADE: ${teams.join('+')}`;const adds=Object.keys(t.adds||{}).map(p=>rFull(p).name).join(', ');return`${t.type.toUpperCase()}: ${teams[0]} added ${adds}`;}).join('\n');
    const stT=streaks.map(s=>`${s.name}: ${s.sub}`).join('\n');
    const rkT=rankings.map((r,i)=>`${i+1}. ${r.name} (avg ${r.avg})`).join('\n');
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1300,messages:[{role:'user',content:`Witty commissioner newsletter for "${d.league?.name}", Week ${curWk}.\n\nStandings:\n${sT}\n\nScores:\n${mT||'none'}\n\nPower Rankings:\n${rkT}\n\nStreaks:\n${stT||'none'}\n\nTransactions:\n${tT||'none'}\n\n4-5 paragraphs, trash-talky. Name teams. Plain text.`}]})});
      const dd2=await res.json();
      if(dd2.error)throw new Error(dd2.error.message);
      setNletter(dd2.content?.map(c=>c.text||'').join('')||'No response.');
    }catch(e){setNletter('Error: '+e.message);}
    setNlLoading(false);
  };

  const NAV=[{id:'feed',icon:'📡',label:'Feed'},{id:'teams',icon:'👥',label:'Teams'},{id:'rankings',icon:'📊',label:'Power Rankings'},{id:'standings',icon:'🏆',label:'Standings'},{id:'matchups',icon:'⚔️',label:'Matchups'},{id:'transactions',icon:'💼',label:'Moves'},{id:'draft',icon:'📋',label:'Draft'},{id:'history',icon:'🏅',label:'History'},{id:'newsletter',icon:'📰',label:'Newsletter'}];

  const wkBar=(wk,setWk)=>(
    <div className="wkbar">
      <span style={{fontSize:10,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.05em'}}>Week</span>
      <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
        {Array.from({length:curWk},(_,i)=>i+1).map(w=><button key={w} className="btn wkbtn" onClick={()=>setWk(w)} style={{fontWeight:w===wk?700:400,background:w===wk?'var(--hdr)':'none',color:w===wk?'var(--ht)':'var(--tx)',borderColor:w===wk?'var(--hdr)':'var(--bd2)'}}>{w}</button>)}
      </div>
    </div>
  );

  const sidebar=(
    <div className="sdbar-wrap">
      <div className="card sdbar" style={{padding:'1.25rem 1.25rem 1rem'}}>
        <div style={{fontSize:11,fontWeight:800,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--t3)',marginBottom:'1rem'}}>⚡ Power Rankings</div>
        {rankings.map((t,i)=>{
          const color=rankColor(i+1,rankings.length);
          const streak=streaks.find(s=>String(s.rid)===String(t.rid));
          return(
            <div key={t.rid} style={{marginBottom:'1rem',paddingBottom:'1rem',borderBottom:'.5px solid var(--bd)'}}>
              {/* Team row */}
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:t.top3.length>0&&players?8:0}}>
                <div style={{width:32,height:32,borderRadius:9,background:color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:`0 2px 6px ${color}44`}}>
                  <span style={{fontSize:15,fontWeight:800,color:'#fff'}}>{i+1}</span>
                </div>
                <Av avatar={t.av} name={t.name} size={32}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,fontWeight:800,letterSpacing:'-.02em',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</div>
                  <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap',marginTop:1}}>
                    <span style={{fontSize:11,color:'var(--t3)',fontWeight:600}}>{t.wins}-{t.losses}</span>
                    <span style={{fontSize:10,color:'var(--t3)'}}>·</span>
                    <span style={{fontSize:11,color:'var(--t3)'}}>{t.avg} ppg</span>
                    {streak&&<span style={{fontSize:9,fontWeight:700,padding:'1px 5px',borderRadius:20,...spStyle(streak.type)}}>{streak.count}{streak.type.includes('streak')?streak.type.includes('hot')?'W🔥':'L❄️':streak.type.includes('hot')?'↑📈':'↓📉'}</span>}
                  </div>
                </div>
              </div>
              {/* Top players */}
              {t.top3.length>0&&players&&(
                <div style={{marginLeft:42,display:'flex',flexDirection:'column',gap:3}}>
                  {t.top3.map((p,pi)=>{
                    const pcol=pc(p.pos);
                    return(
                      <div key={pi} style={{display:'flex',alignItems:'center',gap:6,padding:'4px 7px',background:pi===0?`${color}12`:'var(--bg)',borderRadius:7,border:pi===0?`1px solid ${color}25`:'none'}}>
                        <span style={{fontSize:9,fontWeight:800,color:pi===0?color:'var(--t3)',width:10,flexShrink:0}}>{pi===0?'①':pi===1?'②':'③'}</span>
                        <span style={{fontSize:9,fontWeight:800,padding:'1px 4px',borderRadius:3,background:pcol.accent+'22',color:pcol.accent,flexShrink:0}}>{p.pos}</span>
                        <span style={{fontSize:12,fontWeight:700,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--tx)'}}>{p.name}</span>
                        <span style={{fontSize:11,fontWeight:800,color:pi===0?color:'var(--t2)',flexShrink:0}}>{p.pts}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
        {prevSznLabel&&activeSzn===LEAGUE_ID&&<div style={{fontSize:10,color:'var(--t3)',lineHeight:1.5}}>Ordered by {prevSznLabel} final standings.</div>}
      </div>
      <NewsBox/>
    </div>
  );

  // ── Render ────────────────────────────────────────────────
  if(err)return<div className="loading"><div style={{color:'var(--red)',fontSize:14}}>{err}</div></div>;
  if(!initLoaded)return(
    <div className="loading">
      <Spin s={28}/>
      <div style={{fontSize:14,fontWeight:700}}>Loading your league…</div>
      <div className="prog"><div className="prog-f" style={{width:prog+'%'}}/></div>
      <div style={{fontSize:11,color:'var(--t3)'}}>{prog<30?'Fetching league…':prog<70?'Loading all weeks…':prog<85?'Building season history…':'Almost ready…'}</div>
    </div>
  );

  const activeSznLoading=loadingSzns.has(activeSzn);
  const activeData=d.loaded;

  return(
    <div>
      <header className="hdr">
        <div className="hdr-i">
          <div>
            <div className="ltitle">🏈 {d.league?.name||'Fantasy League'}</div>
            <div className="lsub">{d.league?.season} · {(d.rosters||[]).length} teams · Week {curWk}</div>
          </div>
          <nav className="nav">
            {NAV.map(n=><button key={n.id} className={`ntab${view===n.id?' on':''}`} onClick={()=>{
              setView(n.id);
              if(n.id!=='teams')setTeamId(null);
              // Pre-load all seasons when History tab is opened
              if(n.id==='history'){
                seasonChain.forEach(s=>{
                  if(s.id!==LEAGUE_ID&&!cache[s.id]?.loaded&&!loadingSzns.has(s.id)){
                    setLoadingSzns(ls=>{const n=new Set(ls);n.add(s.id);return n;});
                    loadSeasonData(s.id,get).then(data=>{
                      setCache(c=>({...c,[s.id]:data}));
                      setLoadingSzns(ls=>{const n=new Set(ls);n.delete(s.id);return n;});
                    }).catch(()=>setLoadingSzns(ls=>{const n=new Set(ls);n.delete(s.id);return n;}));
                  }
                });
              }
            }}>{n.icon} {n.label}</button>)}
          </nav>
        </div>
        {seasonChain.length>1&&(
          <div className="szn-bar">
            <div className="szn-i">
              {seasonChain.map(s=>(
                <button key={s.id} className={`szntab${activeSzn===s.id?' on':''}${loadingSzns.has(s.id)?' loading':''}`} onClick={()=>{setActiveSzn(s.id);setMxWk(1);setTxWk(1);}}>
                  {loadingSzns.has(s.id)?'…':s.season}
                </button>
              ))}
            </div>
          </div>
        )}
      </header>

      {activeSznLoading&&(
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,padding:'3rem',color:'var(--t3)',fontSize:13}}>
          <Spin s={18}/> Loading {seasonChain.find(s=>s.id===activeSzn)?.season||'season'} data…
        </div>
      )}

      {!activeSznLoading&&activeData&&(
        <>
        {/* FEED */}
        {view==='feed'&&(
          <div className="pg">
            <div>
              {/* League banner */}
              <div className="lg-banner">
                <div className="lg-banner-main">{LEAGUE_TAGLINE}</div>
              </div>
              {/* Season card */}
              <div className="card cp" style={{marginBottom:'1.1rem',borderRadius:'0 0 var(--rl) var(--rl)',borderTop:'none',borderTopLeftRadius:0,borderTopRightRadius:0}}>
                {(()=>{
                  const st=d.nflState?.season_type;
                  const yr=d.league?.season||'';
                  const label=st==='pre'?`${yr} Preseason`:st==='regular'?`${yr} Season`:st==='post'?`${yr} Postseason`:`${yr} Offseason`;
                  return(
                    <div style={{textAlign:'center'}}>
                      <div style={{fontSize:26,fontWeight:900,letterSpacing:'-.03em',color:'var(--tx)'}}>{label}</div>
                      {LEAGUE_MESSAGE&&<div style={{fontSize:16,fontWeight:600,color:'var(--t2)',marginTop:4,letterSpacing:'-.01em'}}>{LEAGUE_MESSAGE}</div>}
                    </div>
                  );
                })()}
              </div>
              {/* Ruler */}
              <div className="ruler-wrap">
                <svg viewBox="0 0 880 88" xmlns="http://www.w3.org/2000/svg" style={{width:'100%',display:'block',borderRadius:10,filter:'drop-shadow(0 2px 8px rgba(0,0,0,0.13))'}}>
                  <defs>
                    <linearGradient id="rg" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="#F0C84A"/>
                      <stop offset="40%" stopColor="#E0A820"/>
                      <stop offset="100%" stopColor="#C88A10"/>
                    </linearGradient>
                    <linearGradient id="eg" x1="0" y1="0" x2="1" y2="0">
                      <stop offset="0%" stopColor="#8B5E10"/>
                      <stop offset="8%" stopColor="#C88A10"/>
                      <stop offset="92%" stopColor="#C88A10"/>
                      <stop offset="100%" stopColor="#8B5E10"/>
                    </linearGradient>
                  </defs>
                  <rect x="0" y="0" width="880" height="88" rx="9" fill="url(#rg)"/>
